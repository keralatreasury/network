<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD-WAN NOC · Advanced Monitoring Dashboard</title>
    
    <!-- LOCAL RESOURCES - Using existing from main project -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/font-awesome.min.css">
    
    <!-- Chart.js -->
    <script src="../js/chart.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f0f5fa;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            color: #1e293b;
        }
        
        .dashboard {
            max-width: 1800px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #0f5b9c;
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 0;
        }
        
        .header h1 i {
            background: linear-gradient(135deg, #0f5b9c, #1a4b7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }
        
        .status-badge {
            background: white;
            padding: 8px 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
            color: #1e293b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .status-badge i {
            color: #0f5b9c;
        }
        
        .refresh-btn {
            background: white;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .refresh-btn:hover {
            background: #f8fafc;
            border-color: #0f5b9c;
            color: #0f5b9c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 91, 156, 0.15);
        }
        
        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .kpi-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e9ecef;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.2s;
        }
        
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(15, 91, 156, 0.12);
        }
        
        .kpi-icon {
            font-size: 2rem;
            color: #0f5b9c;
            margin-bottom: 12px;
        }
        
        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
        }
        
        .kpi-label {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 8px;
        }
        
        .kpi-trend {
            font-size: 0.75rem;
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .trend-up { background: #dcfce7; color: #15803d; }
        .trend-down { background: #fee2e2; color: #b91c1c; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e9ecef;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(15, 91, 156, 0.12);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            border-bottom: 1px solid #eef2f6;
            padding-bottom: 14px;
        }
        
        .card-header i {
            font-size: 1.6rem;
            color: #0f5b9c;
            background: #e8f0fe;
            padding: 10px;
            border-radius: 14px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a4b7a;
            margin: 0;
        }
        
        .card-header p {
            font-size: 0.75rem;
            color: #64748b;
            margin: 4px 0 0 0;
        }
        
        .chart-wrapper {
            height: 220px;
            position: relative;
            margin: 10px 0 15px 0;
        }
        
        .stats-mini {
            display: flex;
            justify-content: space-around;
            background: #f8fafc;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #e9ecef;
            color: #1e293b;
            font-weight: 500;
            margin-top: 12px;
            font-size: 0.8rem;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .gantt-container {
            overflow-x: auto;
            padding: 10px 0;
        }
        
        .gantt-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        
        .gantt-label {
            width: 180px;
            font-weight: 500;
            color: #1e293b;
            flex-shrink: 0;
        }
        
        .gantt-bar-container {
            flex: 1;
            height: 32px;
            background: #e9ecef;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .gantt-bar {
            height: 100%;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 8px;
            font-size: 0.7rem;
            color: white;
            font-weight: 500;
        }
        
        .branch-tag {
            background: #e8f0fe;
            color: #0f5b9c;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.8rem;
            border: 1px solid #b8d4fe;
            transition: all 0.2s;
        }
        
        .branch-tag:hover {
            background: #0f5b9c;
            color: white;
            transform: translateY(-1px);
        }
        
        .footer {
            margin-top: 30px;
            padding: 20px;
            text-align: right;
            color: #64748b;
            border-top: 1px solid #e9ecef;
            font-size: 0.85rem;
        }
        
        .loading, .error {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e9ecef;
        }
        
        .error {
            background: #fef2f2;
            color: #991b1b;
            border-color: #fecaca;
        }
        
        .error button {
            background: #0f5b9c;
            border: none;
            color: white;
            padding: 10px 28px;
            border-radius: 40px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .gantt-label { width: 120px; }
            .kpi-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>
                <i class="bi bi-hdd-stack-fill"></i> 
                SD-WAN NOC · Advanced Analytics
            </h1>
            <div class="status-badge">
                <i class="bi bi-cloud-check"></i>
                <span id="lastUpdate">fetching live...</span>
            </div>
            <button class="refresh-btn" onclick="loadLiveData()">
                <i class="bi bi-arrow-repeat"></i> refresh now
            </button>
        </div>

        <div id="kpiContainer"></div>
        <div id="dashboardGrid" class="grid"></div>
        
        <div class="footer">
            <i class="bi bi-graph-up"></i> All visualizations based on live data from Issue Reported sheet · Outage Timeline, Root Cause Analysis, MTTR, Concurrent Outages
        </div>
    </div>

    <script>
        // Configuration
        const API_KEY = 'AIzaSyBB1V3vJpNZ9X1GIF-YOwoa6YSt_iXMLo0';
        const SPREADSHEET_ID = '1q70H2WSERyz_agwb0ZirYzs2MhAO1sIB7GKlAGxvtUo';
        const SHEET_NAME = 'Issue reported';
        const RANGE = 'A:M';

        let chartInstances = [];

        // Helper: parse date/time
        function parseDateTime(dateStr, timeStr) {
            if (!dateStr) return null;
            try {
                let d = new Date(dateStr);
                if (timeStr) {
                    let [h, m, s] = timeStr.split(':');
                    d.setHours(parseInt(h), parseInt(m), parseInt(s || 0));
                }
                return d;
            } catch(e) { return null; }
        }
        
        function getDurationMinutes(startDate, startTime, endDate, endTime) {
            let start = parseDateTime(startDate, startTime);
            let end = parseDateTime(endDate, endTime);
            if (!start || !end) return null;
            return Math.max(0, (end - start) / 60000);
        }

        async function loadLiveData() {
            const grid = document.getElementById('dashboardGrid');
            const kpiContainer = document.getElementById('kpiContainer');
            grid.innerHTML = `<div class="loading"><div class="spinner-border text-primary"></div><p class="mt-3">Loading outage data...</p></div>`;
            
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}!${RANGE}?key=${API_KEY}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                const data = await response.json();
                if (!data.values || data.values.length < 2) throw new Error('No data found');
                
                document.getElementById('lastUpdate').innerHTML = `<i class="bi bi-check-circle-fill" style="color:#10b981;"></i> updated ${new Date().toLocaleTimeString()}`;
                
                const rows = data.values;
                const headers = rows[0];
                const rawData = rows.slice(1).filter(row => row.length > 1 && row[0] && row[0].trim() !== '');
                
                processOutageData(rawData, headers);
                
            } catch (error) {
                console.error('Error:', error);
                grid.innerHTML = `<div class="error"><i class="bi bi-exclamation-triangle-fill" style="font-size:2rem;"></i><h4>Failed to load data</h4><p>${error.message}</p><button onclick="loadLiveData()">Retry</button></div>`;
                kpiContainer.innerHTML = '';
            }
        }
        
        function processOutageData(rows, headers) {
            // Find column indexes
            const colIdx = {
                caseId: 0,
                downDate: 1,
                downTime: 2,
                branch: 3,
                treasury: 4,
                issueWan: 5,
                provider: 6,
                status: 7,
                dotRemarks: 8,
                tryRemarks: 9,
                resolveStatus: 10,
                resolvedDate: 11,
                resolvedTime: 12
            };
            
            // Parse data
            const outages = [];
            const branches = new Map();
            const rootCauses = new Map();
            const wanIssues = { 'WAN 1': 0, 'WAN 2': 0 };
            const providerIssues = new Map();
            const dailyOutages = new Map();
            const hourlyOutages = new Array(24).fill(0);
            
            rows.forEach(row => {
                const outage = {
                    caseId: row[colIdx.caseId] || '',
                    downDate: row[colIdx.downDate] || '',
                    downTime: row[colIdx.downTime] || '',
                    branch: row[colIdx.branch] || '',
                    treasury: row[colIdx.treasury] || '',
                    wan: row[colIdx.issueWan] || '',
                    provider: row[colIdx.provider] || '',
                    status: row[colIdx.status] || '',
                    dotRemarks: (row[colIdx.dotRemarks] || '').toLowerCase(),
                    tryRemarks: (row[colIdx.tryRemarks] || '').toLowerCase(),
                    resolveStatus: row[colIdx.resolveStatus] || '',
                    resolvedDate: row[colIdx.resolvedDate] || '',
                    resolvedTime: row[colIdx.resolvedTime] || ''
                };
                
                // Calculate duration
                let duration = null;
                if (outage.resolveStatus === 'Resolved' && outage.resolvedDate) {
                    duration = getDurationMinutes(outage.downDate, outage.downTime, outage.resolvedDate, outage.resolvedTime);
                }
                outage.durationMinutes = duration;
                
                outages.push(outage);
                
                // Branch stats
                const branchName = outage.branch || outage.treasury?.split(' ')[0] || 'Unknown';
                if (!branches.has(branchName)) {
                    branches.set(branchName, { total: 0, resolved: 0, totalDuration: 0 });
                }
                const branchStat = branches.get(branchName);
                branchStat.total++;
                if (outage.resolveStatus === 'Resolved') branchStat.resolved++;
                if (duration) branchStat.totalDuration += duration;
                
                // Root cause analysis
                let cause = 'Unknown';
                const remarks = (outage.dotRemarks + ' ' + outage.tryRemarks).toLowerCase();
                if (remarks.includes('power') || remarks.includes('power failure')) cause = 'Power Failure';
                else if (remarks.includes('fiber') || remarks.includes('cut')) cause = 'Fiber Cut';
                else if (remarks.includes('bsnl') || remarks.includes('mpls')) cause = 'Provider Issue';
                else if (remarks.includes('rail')) cause = 'Railtel Issue';
                rootCauses.set(cause, (rootCauses.get(cause) || 0) + 1);
                
                // WAN distribution
                if (outage.wan === 'WAN 1') wanIssues['WAN 1']++;
                else if (outage.wan === 'WAN 2') wanIssues['WAN 2']++;
                
                // Provider issues
                if (outage.provider) {
                    providerIssues.set(outage.provider, (providerIssues.get(outage.provider) || 0) + 1);
                }
                
                // Daily outages (by down date)
                if (outage.downDate) {
                    const dateKey = outage.downDate;
                    dailyOutages.set(dateKey, (dailyOutages.get(dateKey) || 0) + 1);
                }
                
                // Hourly pattern
                if (outage.downTime) {
                    const hour = parseInt(outage.downTime.split(':')[0]);
                    if (!isNaN(hour) && hour >= 0 && hour < 24) hourlyOutages[hour]++;
                }
            });
            
            // Calculate MTTR (mean time to resolve)
            const resolvedDurations = outages.filter(o => o.durationMinutes !== null).map(o => o.durationMinutes);
            const avgMTTR = resolvedDurations.length > 0 ? Math.round(resolvedDurations.reduce((a,b) => a+b, 0) / resolvedDurations.length) : 0;
            const totalOutages = outages.length;
            const resolvedCount = outages.filter(o => o.resolveStatus === 'Resolved').length;
            
            // Build KPI cards
            buildKPIs(totalOutages, resolvedCount, avgMTTR, branches.size, rootCauses);
            
            // Destroy old charts
            chartInstances.forEach(ch => ch.destroy());
            chartInstances = [];
            
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '';
            
            // 1. Time Series Line Chart - Outage Events Timeline
            addTimeSeriesChart(grid, dailyOutages);
            
            // 2. Stacked Bar Chart - Outage Duration by Branch
            addDurationByBranchChart(grid, branches);
            
            // 3. Pie Chart - Root Cause Distribution
            addRootCauseChart(grid, rootCauses);
            
            // 4. Heatmap - Outages by Branch and Hour
            addHeatmapChart(grid, outages, hourlyOutages);
            
            // 5. Dual-Axis - Resolution Time Analysis (MTTR by Branch)
            addMTTRByBranchChart(grid, branches);
            
            // 6. Gantt Chart - Concurrent Outages Timeline
            addGanttChart(grid, outages);
            
            // 7. Funnel Chart - Resolution Flow
            addFunnelChart(grid, outages, resolvedCount, totalOutages);
            
            // 8. Scatter Plot - Response Time vs Resolution Time
            addScatterPlot(grid, outages);
            
            // 9. Tree Map - Outage Impact by Branch (using bar as alternative)
            addImpactTreeMap(grid, branches);
            
            // 10. Control Chart - Outage Frequency
            addControlChart(grid, dailyOutages);
        }
        
        function buildKPIs(total, resolved, avgMTTR, branchCount, rootCauses) {
            const kpiContainer = document.getElementById('kpiContainer');
            const resolutionRate = total > 0 ? Math.round((resolved / total) * 100) : 0;
            const topCause = [...rootCauses.entries()].sort((a,b) => b[1] - a[1])[0]?.[0] || 'N/A';
            
            kpiContainer.innerHTML = `
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-icon"><i class="bi bi-exclamation-triangle"></i></div><div class="kpi-value">${total}</div><div class="kpi-label">Total Outages</div></div>
                    <div class="kpi-card"><div class="kpi-icon"><i class="bi bi-check-circle"></i></div><div class="kpi-value">${resolutionRate}%</div><div class="kpi-label">Resolution Rate</div><div class="kpi-trend trend-up">${resolved} resolved</div></div>
                    <div class="kpi-card"><div class="kpi-icon"><i class="bi bi-clock-history"></i></div><div class="kpi-value">${avgMTTR}</div><div class="kpi-label">Avg MTTR (mins)</div></div>
                    <div class="kpi-card"><div class="kpi-icon"><i class="bi bi-building"></i></div><div class="kpi-value">${branchCount}</div><div class="kpi-label">Affected Branches</div></div>
                    <div class="kpi-card"><div class="kpi-icon"><i class="bi bi-lightning-charge"></i></div><div class="kpi-value">${topCause}</div><div class="kpi-label">Top Root Cause</div></div>
                </div>
            `;
        }
        
        function addCard(parent, icon, title, desc, chartId, chartBuilder, statsText = '') {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header"><i class="bi ${icon}"></i><div><h3>${title}</h3><p>${desc}</p></div></div>
                <div class="chart-wrapper"><canvas id="${chartId}"></canvas></div>
                <div class="stats-mini">${statsText}</div>
            `;
            parent.appendChild(card);
            chartBuilder(chartId);
        }
        
        function addTimeSeriesChart(parent, dailyOutages) {
            const sortedDates = [...dailyOutages.keys()].sort();
            const values = sortedDates.map(d => dailyOutages.get(d));
            addCard(parent, 'bi-graph-up', 'Outage Timeline', 'Daily outage events', 'chart-timeseries', (id) => {
                const ctx = document.getElementById(id).getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'line', data: { labels: sortedDates, datasets: [{ label: 'Outages', data: values, borderColor: '#0f5b9c', backgroundColor: 'rgba(15,91,156,0.1)', fill: true, tension: 0.3, pointRadius: 5, pointBackgroundColor: '#0f5b9c' }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
                });
                chartInstances.push(chart);
            }, `Total: ${values.reduce((a,b)=>a+b,0)} outages · Peak: ${Math.max(...values,0)} on ${sortedDates[values.indexOf(Math.max(...values))] || 'N/A'}`);
        }
        
        function addDurationByBranchChart(parent, branches) {
            const sorted = [...branches.entries()].sort((a,b) => b[1].totalDuration - a[1].totalDuration).slice(0, 8);
            const labels = sorted.map(b => b[0]);
            const durations = sorted.map(b => Math.round(b[1].totalDuration));
            addCard(parent, 'bi-bar-chart-steps', 'Downtime by Branch', 'Total outage minutes', 'chart-duration', (id) => {
                const ctx = document.getElementById(id).getContext('2d');
                const chart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'Downtime (mins)', data: durations, backgroundColor: '#f59e0b', borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: false } });
                chartInstances.push(chart);
            }, `Highest downtime: ${sorted[0]?.[0]} (${Math.round(sorted[0]?.[1].totalDuration)} mins)`);
        }
        
        function addRootCauseChart(parent, rootCauses) {
            const causes = [...rootCauses.entries()];
            addCard(parent, 'bi-pie-chart', 'Root Cause Analysis', 'Primary failure reasons', 'chart-cause', (id) => {
                const ctx = document.getElementById(id).getContext('2d');
                const chart = new Chart(ctx, { type: 'pie', data: { labels: causes.map(c => c[0]), datasets: [{ data: causes.map(c => c[1]), backgroundColor: ['#ef4444', '#f59e0b', '#10b981', '#8b5cf6', '#64748b'] }] }, options: { responsive: true, maintainAspectRatio: false } });
                chartInstances.push(chart);
            }, `Most frequent: ${causes[0]?.[0]} (${causes[0]?.[1]} incidents)`);
        }
        
        function addHeatmapChart(parent, outages, hourlyOutages) {
            const branchHourMap = new Map();
            outages.forEach(o => {
                const branch = o.branch || 'Unknown';
                const hour = o.downTime ? parseInt(o.downTime.split(':')[0]) : -1;
                if (hour >= 0) {
                    if (!branchHourMap.has(branch)) branchHourMap.set(branch, new Array(24).fill(0));
                    branchHourMap.get(branch)[hour]++;
                }
            });
            const topBranches = [...branchHourMap.entries()].sort((a,b) => b[1].reduce((s,v)=>s+v,0) - a[1].reduce((s,v)=>s+v,0)).slice(0, 6);
            const heatData = topBranches.map(b => b[1]);
            addCard(parent, 'bi-grid-3x3-gap-fill', 'Outage Heatmap', 'Hour × Branch (color intensity)', 'chart-heat', (id) => {
                const ctx = document.getElementById(id).getContext('2d');
                const chart = new Chart(ctx, { type: 'bar', data: { labels: Array.from({length:24},(_,i)=>`${i}:00`), datasets: topBranches.map((b,idx) => ({ label: b[0], data: b[1], backgroundColor: `hsla(${idx * 45}, 70%, 60%, 0.7)`, stack: false })) }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { maxRotation: 45, autoSkip: true } } } } });
                chartInstances.push(chart);
            }, `Peak hour: ${hourlyOutages.indexOf(Math.max(...hourlyOutages))}:00`);
        }
        
        function addMTTRByBranchChart(parent, branches) {
            const mttrData = [...branches.entries()].map(([name, stats]) => ({ name, mttr: stats.resolved > 0 ? Math.round(stats.totalDuration / stats.resolved) : 0 })).filter(d => d.mttr > 0).sort((a,b) => b.mttr - a.mttr).slice(0, 8);
            addCard(parent, 'bi-speedometer2', 'MTTR by Branch', 'Mean time to resolve (minutes)', 'chart-mttr', (id) => {
                const ctx = document.getElementById(id).getContext('2d');
                const chart = new Chart(ctx, { type: 'bar', data: { labels: mttrData.map(d => d.name), datasets: [{ label: 'Avg Resolution Time (mins)', data: mttrData.map(d => d.mttr), backgroundColor: '#10b981' }] }, options: { responsive: true, maintainAspectRatio: false } });
                chartInstances.push(chart);
            }, `Slowest resolution: ${mttrData[0]?.name} (${mttrData[0]?.mttr} mins)`);
        }
        
        function addGanttChart(parent, outages) {
            const recentOutages = outages.filter(o => o.resolvedDate).slice(0, 12);
            const ganttContainer = document.createElement('div');
            ganttContainer.className = 'card full-width';
            ganttContainer.innerHTML = `<div class="card-header"><i class="bi bi-calendar-range"></i><div><h3>Concurrent Outages Timeline (Gantt)</h3><p>Recent outage durations by branch</p></div></div><div class="gantt-container" id="gantt-visual"></div><div class="stats-mini">Horizontal bars show outage duration · Overlap indicates concurrent failures</div>`;
            parent.appendChild(ganttContainer);
            const ganttDiv = ganttContainer.querySelector('#gantt-visual');
            const maxDuration = Math.max(...recentOutages.map(o => o.durationMinutes || 0), 1);
            recentOutages.forEach(o => {
                const widthPercent = Math.min(100, ((o.durationMinutes || 5) / maxDuration) * 100);
                const branchName = o.branch || o.treasury?.substring(0,15) || 'Unknown';
                const color = o.wan === 'WAN 1' ? '#0f5b9c' : '#8b5cf6';
                const durationText = o.durationMinutes ? `${Math.round(o.durationMinutes)} min` : 'N/A';
                const row = document.createElement('div');
                row.className = 'gantt-row';
                row.innerHTML = `<div class="gantt-label">${branchName} (${o.wan})</div><div class="gantt-bar-container"><div class="gantt-bar" style="width: ${widthPercent}%; background: ${color};">${durationText}</div></div>`;
                ganttDiv.appendChild(row);
            });
        }
        
        function addFunnelChart(parent, outages, resolved, total) {
            const wip = total - resolved;
            addCard(parent, 'bi-funnel', 'Resolution Funnel', 'Issues reported → Resolved', 'chart-funnel', (id) => {
                const ctx = document.getElementById(id).getContext('2d');
                const chart = new Chart(ctx, { type: 'bar', data: { labels: ['Reported', 'Resolved'], datasets: [{ label: 'Count', data: [total, resolved], backgroundColor: ['#0f5b9c', '#10b981'], borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y' } });
                chartInstances.push(chart);
            }, `Resolution rate: ${total > 0 ? Math.round(resolved/total*100) : 0}% · ${wip} pending`);
        }
        
        function addScatterPlot(parent, outages) {
            const resolvedOutages = outages.filter(o => o.durationMinutes !== null && o.durationMinutes > 0).slice(0, 30);
            const scatterData = resolvedOutages.map((o, idx) => ({ x: idx, y: o.durationMinutes }));
            addCard(parent, 'bi-scatter', 'Response vs Resolution', 'Each point = outage duration', 'chart-scatter', (id) => {
                const ctx = document.getElementById(id).getContext('2d');
                const chart = new Chart(ctx, { type: 'scatter', data: { datasets: [{ label: 'Outage Duration (mins)', data: scatterData, backgroundColor: '#f59e0b', pointRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { title: { display: true, text: 'Duration (mins)' } } } } });
                chartInstances.push(chart);
            }, `Avg duration: ${Math.round(resolvedOutages.reduce((a,b)=>a+(b.durationMinutes||0),0)/resolvedOutages.length||0)} mins`);
        }
        
        function addImpactTreeMap(parent, branches) {
            const impactData = [...branches.entries()].map(([name, stats]) => ({ name, outages: stats.total })).sort((a,b) => b.outages - a.outages).slice(0, 10);
            addCard(parent, 'bi-diagram-3', 'Impact Tree Map', 'Outage count by branch', 'chart-impact', (id) => {
                const ctx = document.getElementById(id).getContext('2d');
                const chart = new Chart(ctx, { type: 'bar', data: { labels: impactData.map(d => d.name), datasets: [{ label: 'Outage Count', data: impactData.map(d => d.outages), backgroundColor: '#ef4444' }] }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y' } });
                chartInstances.push(chart);
            }, `Most impacted: ${impactData[0]?.name} (${impactData[0]?.outages} outages)`);
        }
        
        function addControlChart(parent, dailyOutages) {
            const sorted = [...dailyOutages.keys()].sort();
            const values = sorted.map(d => dailyOutages.get(d));
            const avg = values.reduce((a,b)=>a+b,0) / (values.length || 1);
            const ucl = avg + 2 * Math.sqrt(avg);
            const lcl = Math.max(0, avg - 2 * Math.sqrt(avg));
            addCard(parent, 'bi-graph-up', 'Control Chart', 'Outage frequency with control limits', 'chart-control', (id) => {
                const ctx = document.getElementById(id).getContext('2d');
                const chart = new Chart(ctx, { type: 'line', data: { labels: sorted, datasets: [
                    { label: 'Daily Outages', data: values, borderColor: '#0f5b9c', tension: 0.2 },
                    { label: 'UCL', data: Array(values.length).fill(ucl), borderColor: '#ef4444', borderDash: [5,5], fill: false },
                    { label: 'LCL', data: Array(values.length).fill(lcl), borderColor: '#10b981', borderDash: [5,5], fill: false }
                ] }, options: { responsive: true, maintainAspectRatio: false } });
                chartInstances.push(chart);
            }, `Avg: ${avg.toFixed(1)} · UCL: ${ucl.toFixed(1)} · ${values[values.length-1] > ucl ? '⚠️ Above threshold' : 'Stable'}`);
        }
        
        window.onload = loadLiveData;
    </script>
</body>
</html>
