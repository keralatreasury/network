<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report WAN Issue</title>

    <!-- LOCAL CSS -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/select2.min.css">
    <link rel="stylesheet" href="../css/select2-bootstrap-5-theme.min.css">
    
    <!-- LOCAL Flatpickr Resources -->
    <link rel="stylesheet" href="../css/flatpickr.min.css">
    <script src="../js/flatpickr.min.js"></script>

    <style>
        :root {
            --primary: #0f5b9c;
            --primary-dark: #1a4b7a;
            --primary-light: #e8f0fe;
            --success: #10b981;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #e9ecef;
        }

        body {
            background: #f0f5fa;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            color: var(--dark);
        }

        .form-container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 15px 25px;
        }

        .form-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-header h2 i {
            font-size: 1.8rem;
            background: rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 10px;
        }

        .form-body {
            padding: 20px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 3px;
            color: var(--dark);
        }

        .form-label i {
            color: var(--primary);
            margin-right: 4px;
            font-size: 0.8rem;
        }

        .required:after {
            content: " *";
            color: #dc3545;
            font-size: 0.8rem;
        }

        .form-control, .form-select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.9rem;
            height: 38px;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(15, 91, 156, 0.1);
        }

        .form-control[readonly] {
            background-color: var(--light);
            cursor: not-allowed;
        }

        .input-group-text {
            background: var(--primary-light);
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: 8px 0 0 8px;
            padding: 6px 12px;
            font-size: 0.9rem;
        }

        .generated-caseid {
            background: #e8f7ed;
            color: #0b5e42;
            font-family: monospace;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 8px 15px;
            border-radius: 8px;
            border-left: 3px solid #10b981;
            margin-bottom: 15px;
        }

        .select2-container--bootstrap-5 .select2-selection {
            border-radius: 8px !important;
            border: 1px solid var(--border) !important;
            min-height: 38px !important;
            padding: 3px 10px !important;
            font-size: 0.9rem !important;
        }

        .row {
            margin-bottom: 12px;
        }

        .btn-reset, .btn-submit {
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-reset {
            background: white;
            border: 1px solid var(--border);
            color: var(--dark);
        }

        .btn-reset:hover {
            background: var(--light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            color: white;
            box-shadow: 0 3px 10px rgba(15, 91, 156, 0.2);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(15, 91, 156, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        textarea.form-control {
            height: auto;
            min-height: 60px;
            resize: vertical;
        }

        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            border-left: 4px solid;
            max-width: 400px;
        }

        .alert-success {
            border-left-color: #10b981;
        }

        .alert-error {
            border-left-color: #ef4444;
        }

        .alert i {
            font-size: 1.2rem;
            margin-right: 10px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .g-2, .gy-2 {
            --bs-gutter-y: 0.5rem;
        }

        #timeInput:not([readonly]) {
            background-color: white;
            cursor: text;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <!-- Header -->
        <div class="form-header">
            <h2>
                <i class="bi bi-exclamation-triangle-fill"></i>
                Report WAN Issue
            </h2>
        </div>

        <!-- Form Body -->
        <div class="form-body">
            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- Case ID - Full width -->
            <div class="generated-caseid" id="caseIdDisplay">
                <i class="bi bi-qr-code me-2"></i>
                <span id="caseIdValue">Loading...</span>
            </div>

            <!-- Row 1: 2 Columns - Branch and Treasury -->
            <div class="row g-2">
                <div class="col-md-6">
                    <label class="form-label required"><i class="bi bi-diagram-3"></i> Branch</label>
                    <select id="branchSelect" class="form-select" style="width: 100%;">
                        <option value="">Loading branches...</option>
                    </select>
                </div>
				<div class="col-md-6">
                    <label class="form-label required"><i class="bi bi-wifi"></i> Issue Reported WAN</label>
                    <select id="wanSelect" class="form-select" style="width: 100%;">
                        <option value="">Select WAN...</option>
                    </select>
                </div>
               
            </div>

            <!-- Row 2: 3 Columns - Date, Time, Status -->
            <div class="row g-2">
                <div class="col-md-4">
                    <label class="form-label required"><i class="bi bi-calendar"></i> Date</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                        <input type="text" id="datePicker" class="form-control" placeholder="DD/MM/YYYY">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label required"><i class="bi bi-clock"></i> Time</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-clock"></i></span>
                        <input type="text" id="timeInput" class="form-control" placeholder="HH:MM:SS">
                    </div>
                   
                </div>
                <div class="col-md-4">
                    <label class="form-label required"><i class="bi bi-activity"></i> Status</label>
                    <input type="text" id="statusInput" class="form-control" readonly value="Down">
                </div>
            </div>

            <!-- Row 3: 2 Columns - Issue WAN and Service Provider -->
            <div class="row g-2">
                <div class="col-md-6">
                    <label class="form-label"><i class="bi bi-building"></i> Treasury</label>
                    <input type="text" id="treasuryInput" class="form-control" readonly placeholder="Auto-filled">
                </div>
                <div class="col-md-6">
                    <label class="form-label"><i class="bi bi-broadcast"></i> Service Provider</label>
                    <input type="text" id="providerInput" class="form-control" readonly placeholder="Auto-filled">
                </div>
            </div>

            <!-- Row 4: 2 Columns - Remarks -->
            <div class="row g-2">
                <div class="col-md-6">
                    <label class="form-label"><i class="bi bi-chat"></i> DoT Remarks</label>
                    <textarea id="dotRemarks" class="form-control" rows="2" placeholder="Optional"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label"><i class="bi bi-chat"></i> TRY Remarks</label>
                    <textarea id="tryRemarks" class="form-control" rows="2" placeholder="Optional"></textarea>
                </div>
            </div>

            <!-- Form Actions -->
            <div class="d-flex justify-content-between align-items-center mt-3">
               
                <div>
                    <span class="text-muted me-3 small">
					<button type="button" id="submitBtn" class="btn-submit" disabled>
                        <i class="bi bi-send"></i> Submit
                    </button>
                        
                    </span>
                    <button type="button" id="resetBtn" class="btn-reset">
                    <i class="bi bi-arrow-counterclockwise"></i> Reset
                </button>
                </div>
            </div>

           
        </div>
    </div>

    <!-- LOCAL SCRIPTS -->
    <script src="../js/jquery.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/select2.min.js"></script>

    <script>
        $(document).ready(function() {
            // ==================== CONFIG ====================
            const API_KEY = 'AIzaSyBB1V3vJpNZ9X1GIF-YOwoa6YSt_iXMLo0';
            const SPREADSHEET_ID = '1q70H2WSERyz_agwb0ZirYzs2MhAO1sIB7GKlAGxvtUo';
            const WAN_SHEET = 'WAN Details';
            
            // YOUR ACTUAL APPS SCRIPT URL
            const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyv6E-EcvWPz6NZneuOzgs1jPohaXs94Z_Ql-PqhWjcvNirOqMKeWoMV2J2X6dvjLQe6g/exec';

            // ==================== GLOBAL DATA ====================
            let wanData = [];
            let branchMap = new Map();
            let flatpickrInstance = null;

            // ==================== INITIALIZE ====================
            initForm();

            async function initForm() {
                showLoading(true);
                await loadWanDetails();
                initSelect2();
                initDatePicker();
                setDefaultTime();
                showLoading(false);
            }

            function showLoading(show) {
                if (show) {
                    $('#branchSelect').html('<option value="">Loading branches...</option>');
                }
            }

            function setDefaultTime() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                $('#timeInput').val(`${hours}:${minutes}:${seconds}`);
            }

            // ==================== LOAD WAN DETAILS ====================
            async function loadWanDetails() {
                try {
                    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(WAN_SHEET)}!A2:E?key=${API_KEY}`;
                    console.log('Fetching from:', url);
                    
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    console.log('WAN Details received:', data);

                    if (data.values && data.values.length > 0) {
                        processWanData(data.values);
                        populateBranchDropdown();
                    } else {
                        console.error('No data found in WAN Details sheet');
                        $('#branchSelect').html('<option value="">No branches found</option>');
                    }
                } catch (error) {
                    console.error('Error loading WAN details:', error);
                    $('#branchSelect').html('<option value="">Error loading data</option>');
                    showAlert('error', 'Failed to load branch data. Please refresh the page.');
                }
            }

            function processWanData(rows) {
                wanData = [];
                branchMap.clear();
                
                console.log(`Processing ${rows.length} rows from WAN Details`);

                rows.forEach((row, index) => {
                    if (row.length >= 1) {
                        const branch = row[0] ? row[0].toString().trim() : '';
                        
                        if (branch) {
                            const treasury = row[1] ? row[1].toString().trim() : '';
                            const wan1Provider = row[2] ? row[2].toString().trim() : '';
                            const wan2Provider = row[3] ? row[3].toString().trim() : '';
                            
                            wanData.push({
                                branch: branch,
                                treasury: treasury,
                                wan1: wan1Provider,
                                wan2: wan2Provider
                            });
                            
                            branchMap.set(branch, {
                                treasury: treasury,
                                wan1: wan1Provider,
                                wan2: wan2Provider
                            });
                            
                            console.log(`Added branch: ${branch} -> ${treasury}`);
                        }
                    }
                });
                
                console.log(`Total branches loaded: ${wanData.length}`);
            }

            function populateBranchDropdown() {
                const $select = $('#branchSelect');
                $select.empty().append('<option value="">Select Branch...</option>');
                
                if (wanData.length === 0) {
                    $select.append('<option value="">No branches available</option>');
                    return;
                }
                
                wanData.sort((a, b) => a.branch.localeCompare(b.branch)).forEach(item => {
                    $select.append(`<option value="${escapeHtml(item.branch)}">${escapeHtml(item.branch)}</option>`);
                });
                
                console.log(`Populated dropdown with ${wanData.length} branches`);
            }

            // ==================== INIT COMPONENTS ====================
            function initSelect2() {
                $('#branchSelect').select2({
                    theme: 'bootstrap-5',
                    width: '100%',
                    placeholder: 'Search or select branch...',
                    allowClear: true
                });

                $('#wanSelect').select2({
                    theme: 'bootstrap-5',
                    width: '100%',
                    placeholder: 'Select WAN...',
                    allowClear: true,
                    data: [
                        { id: 'WAN 1', text: 'WAN 1 (Primary)' },
                        { id: 'WAN 2', text: 'WAN 2 (Secondary)' }
                    ]
                });
            }

            function initDatePicker() {
                flatpickrInstance = flatpickr("#datePicker", {
                    dateFormat: "d/m/Y",
                    defaultDate: "today",
                    allowInput: true,
                    onChange: function(selectedDates, dateStr, instance) {
                        validateForm();
                    }
                });
            }

            // ==================== CASE ID GENERATION ====================
            function generateCaseId() {
                const branch = $('#branchSelect').val();
                if (!branch) return 'Select a branch';
                
                const now = new Date();
                const year = now.getFullYear().toString().slice(-2);
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                
                return `${branch}${year}${month}${day}${hours}${minutes}`;
            }

            function updateCaseId() {
                $('#caseIdValue').text(generateCaseId());
            }

            // ==================== EVENT HANDLERS ====================
            $('#branchSelect').on('change', function() {
                const branch = $(this).val();
                
                if (branch && branchMap.has(branch)) {
                    const data = branchMap.get(branch);
                    $('#treasuryInput').val(data.treasury || '');
                } else {
                    $('#treasuryInput').val('');
                    $('#providerInput').val('');
                }
                
                $('#wanSelect').val(null).trigger('change');
                updateCaseId();
                validateForm();
            });

            $('#wanSelect').on('change', function() {
                const wan = $(this).val();
                const branch = $('#branchSelect').val();
                
                if (wan && branch && branchMap.has(branch)) {
                    const data = branchMap.get(branch);
                    if (wan === 'WAN 1') {
                        $('#providerInput').val(data.wan1 || '');
                    } else if (wan === 'WAN 2') {
                        $('#providerInput').val(data.wan2 || '');
                    }
                } else {
                    $('#providerInput').val('');
                }
                
                validateForm();
            });

            $('#datePicker, #timeInput').on('change input', validateForm);

            // ==================== FORM VALIDATION ====================
            function validateForm() {
                const branch = $('#branchSelect').val();
                const date = $('#datePicker').val();
                const time = $('#timeInput').val();
                const wan = $('#wanSelect').val();
                
                // Basic time format validation (HH:MM:SS)
                const timeRegex = /^([0-1][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])$/;
                const isValidTime = timeRegex.test(time);
                
                // Basic date format validation (DD/MM/YYYY)
                const dateRegex = /^(\d{2})\/(\d{2})\/(\d{4})$/;
                const isValidDate = dateRegex.test(date);
                
                const isValid = branch && isValidDate && wan && isValidTime;
                $('#submitBtn').prop('disabled', !isValid);
                
                if (!isValidTime && time) {
                    $('#timeInput').addClass('is-invalid');
                } else {
                    $('#timeInput').removeClass('is-invalid');
                }
                
                if (!isValidDate && date) {
                    $('#datePicker').addClass('is-invalid');
                } else {
                    $('#datePicker').removeClass('is-invalid');
                }
                
                return isValid;
            }

            // ==================== RESET FORM ====================
            function resetForm() {
                // Reset selects
                $('#branchSelect').val(null).trigger('change');
                $('#wanSelect').val(null).trigger('change');
                
                // Reset inputs
                $('#treasuryInput').val('');
                $('#providerInput').val('');
                $('#dotRemarks').val('');
                $('#tryRemarks').val('');
                
                // Reset date to today using flatpickr API
                if (flatpickrInstance) {
                    flatpickrInstance.setDate(new Date());
                }
                
                // Reset time to current
                setDefaultTime();
                
                // Update case ID
                updateCaseId();
                
                // Disable submit button
                $('#submitBtn').prop('disabled', true);
                
                // Remove validation classes
                $('#timeInput, #datePicker').removeClass('is-invalid');
            }

            $('#resetBtn').on('click', resetForm);

            // ==================== ALERT FUNCTION ====================
            function showAlert(type, message) {
                const alertHtml = `
                    <div class="alert alert-${type}" id="alertMessage">
                        <i class="bi ${type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'}"></i>
                        <span>${message}</span>
                    </div>
                `;
                
                $('#alertContainer').html(alertHtml);
                
                setTimeout(() => {
                    $('#alertMessage').fadeOut(300, function() {
                        $(this).remove();
                    });
                }, 5000);
            }

            // ==================== SUBMIT HANDLER ====================
         
$('#submitBtn').on('click', async function() {
    if (!validateForm()) {
        showAlert('error', 'Please fill in all required fields with valid format');
        return;
    }

    // Disable button and show loading
    const $btn = $(this);
    const originalText = $btn.html();
    $btn.prop('disabled', true).html('<span class="loading-spinner"></span> Submitting...');

    // Get date from flatpickr and validate
    const dateStr = $('#datePicker').val();
    const dateParts = dateStr.split('/');
    
    // Validate date parts
    if (dateParts.length !== 3) {
        showAlert('error', 'Invalid date format');
        $btn.prop('disabled', false).html(originalText); // RESTORE BUTTON
        return;
    }
    
    // Format date for Google Sheets (YYYY-MM-DD)
                const formattedDate = `${dateParts[0]}/${dateParts[1]}/${dateParts[2]}`;

    // Collect form data
    const formData = {
        caseId: $('#caseIdValue').text(),
        date: formattedDate,
        time: $('#timeInput').val(),
        branch: $('#branchSelect').val(),
        treasury: $('#treasuryInput').val(),
        issueWAN: $('#wanSelect').val(),
        serviceProvider: $('#providerInput').val(),
        status: $('#statusInput').val(),
        dotRemarks: $('#dotRemarks').val() || '',
        tryRemarks: $('#tryRemarks').val() || ''
    };

    console.log('Submitting form data:', formData);

    try {
        // Create form data for submission
        const formBody = new URLSearchParams();
        Object.keys(formData).forEach(key => {
            formBody.append(key, formData[key]);
        });

        const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: formBody
        });

        // Show success message
        showAlert('success', 'Issue reported successfully!');
        
        // COMPLETELY RESET THE FORM
        resetForm();
        
        // RESTORE BUTTON STATE AFTER RESET
        $btn.prop('disabled', false).html(originalText);
        
    } catch (error) {
        console.error('Submission error:', error);
        showAlert('error', 'Failed to submit. Please try again.');
        
        // RESTORE BUTTON ON ERROR
        $btn.prop('disabled', false).html(originalText);
    }
});

            // ==================== UTILITY ====================
            function escapeHtml(text) {
                if (!text) return '';
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            // Initial updates
            updateCaseId();
            setInterval(updateCaseId, 60000);
        });
    </script>
</body>
</html>
