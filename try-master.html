<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Treasury Information</title>
    
    <!-- CSS Resources -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/sweetalert2.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body {
            background: #eef2f7;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 30px 20px;
        }
        .app-card {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            padding: 1.8rem 2rem;
            background: linear-gradient(135deg, #1a3c5e 0%, #2a5a7a 100%);
            color: white;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }
        .header p {
            opacity: 0.9;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        .br-panel {
            padding: 1.2rem 2rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .br-display {
            background: #e6f0ff;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: #1e4a76;
        }
        .manual-group {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .manual-group input {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            width: 200px;
        }
        .btn-primary-custom {
            background: #0f3b5f;
            border: none;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 40px;
            color: white;
        }
        .btn-primary-custom:hover {
            background: #0a2c46;
            transform: translateY(-1px);
        }
        .btn-warning-custom {
            background: #f59e0b;
            border: none;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 40px;
            color: white;
        }
        .btn-secondary-custom {
            background: #6c757d;
            border: none;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 40px;
            color: white;
        }
        .content {
            padding: 2rem;
        }
        .treasury-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .card-header {
            padding: 1.2rem 1.5rem;
            background: #fafcff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .info-row {
            display: flex;
            border-bottom: 1px solid #f0f2f5;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            width: 240px;
            padding: 1rem 1.5rem;
            background: #fafcff;
            font-weight: 600;
            color: #2c5282;
            border-right: 1px solid #e2e8f0;
        }
        .info-value {
            flex: 1;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .edit-input {
            padding: 0.5rem 1rem;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            width: 100%;
            max-width: 350px;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            padding: 1rem;
            color: #5b6e8c;
            border-top: 1px solid #e2e8f0;
        }
        @media (max-width: 768px) {
            .info-label { width: 100%; border-right: none; border-bottom: 1px solid #e2e8f0; }
            .info-row { flex-direction: column; }
        }
        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #global-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(3px);
        }
        .badge-locked {
            background: #e2e8f0;
            color: #64748b;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header">
        <h1><i class="bi bi-bank2"></i> Treasury Information</h1>
       
    </div>
    
    <div class="br-panel">
        <div class="br-display">
            🔑 Branch: <strong id="currentBrCode">—</strong>
        </div>
        <div class="manual-group" style="display:none">
            <input type="text" id="manualBrInput" placeholder="Enter BR Code manually">
            <button id="manualFetchBtn" class="btn-primary-custom">Fetch</button>
            <button id="refreshDataBtn" class="btn-secondary-custom">🔄 Refresh</button>
        </div>
    </div>
    
    <div class="content">
        <div id="treasuryContent"></div>
    </div>
    <footer>
       
    </footer>
</div>

<script src="./js/jquery.min.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>
<script src="./js/sweetalert2.all.min.js"></script>

<script>
    // ================= CONFIGURATION =================
    // IMPORTANT: Replace with your deployed Google Apps Script Web App URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzahzAr8GFDvUSJs4dDAWwZpwPM1nwWXcJDY2i19zju5V1NGCbtk3radTrjXIxZi85Gjg/exec";
    
    // Google Sheets API for reading (fallback)
    const SHEET_ID = "1HvCqLHC8IyllKskBXX1MtMfjQMGUyhMP7KuTuJxDhmU";
    const SHEET_NAME = "Admin Contact Details";
    const API_KEY = "AIzaSyBB1V3vJpNZ9X1GIF-YOwoa6YSt_iXMLo0";
    
    let allRecords = [];
    let currentRecord = null;
    let editMode = false;
    let originalValues = {};
    
    // Helper functions
    function showGlobalLoading(msg = 'Processing...') {
        if($('#global-loading-overlay').length) return;
        $('body').append(`<div id="global-loading-overlay"><div style="background:white;padding:30px;border-radius:24px;text-align:center;"><i class="bi bi-arrow-repeat" style="font-size:48px;color:#0f3b5f;animation:spin 1s linear infinite;"></i><p style="margin-top:15px;">${msg}</p></div></div>`);
    }
    
    function hideGlobalLoading() { 
        $('#global-loading-overlay').remove(); 
    }
    
    function setButtonLoading(btn, isLoading, originalHtml) {
        const $btn = $(btn);
        if(isLoading) {
            $btn.data('original-html', $btn.html());
            $btn.html('<i class="bi bi-arrow-repeat"></i> Processing...');
            $btn.prop('disabled', true).addClass('btn-loading');
        } else {
            $btn.html($btn.data('original-html') || originalHtml);
            $btn.prop('disabled', false).removeClass('btn-loading');
        }
    }
    
    // Get BR Code from browser cache
    function getBRCodeFromCache() {
        let brCode = null;
        
        const sessionUser = sessionStorage.getItem('currentUser');
        if (sessionUser) {
            try {
                const userData = JSON.parse(sessionUser);
                brCode = userData.username || userData.branchCode || userData.brCode;
            } catch(e) {}
        }
        
        if (!brCode) {
            const localUser = localStorage.getItem('currentUser');
            if (localUser) {
                try {
                    const userData = JSON.parse(localUser);
                    brCode = userData.username || userData.branchCode || userData.brCode;
                } catch(e) {}
            }
        }
        
        if (!brCode) brCode = localStorage.getItem('selectedBranch');
        if (!brCode) brCode = sessionStorage.getItem('selectedBranch');
        if (!brCode) brCode = sessionStorage.getItem('brCode');
        if (!brCode) brCode = localStorage.getItem('brCode');
        
        return brCode;
    }
    
    // Fetch data using POST (like menu-list.html)
    async function fetchTreasuryData() {
        showGlobalLoading('Loading treasury data...');
        
        try {
            const payload = { action: "READ" };
            const response = await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();
            
            if (result.success && result.data) {
                allRecords = result.data;
                hideGlobalLoading();
                Swal.fire({ icon: 'success', title: 'Loaded!', text: `${allRecords.length} records found`, timer: 1500, showConfirmButton: false });
                return true;
            } else {
                throw new Error(result.error || "Failed to load data");
            }
        } catch(error) {
            console.log("Apps Script failed, trying Sheets API:", error);
            // Fallback to Google Sheets API
            return await fetchFromSheetsAPI();
        }
    }
    
    // Fallback: Direct Google Sheets API
    async function fetchFromSheetsAPI() {
        try {
            const encodedSheetName = encodeURIComponent(SHEET_NAME);
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodedSheetName}?key=${API_KEY}`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.error) {
                hideGlobalLoading();
                Swal.fire({ icon: 'error', title: 'API Error', text: data.error.message });
                return false;
            }
            
            const rows = data.values || [];
            if (rows.length < 2) {
                hideGlobalLoading();
                Swal.fire({ icon: 'warning', title: 'No Data', text: 'No data found in sheet' });
                return false;
            }
            
            const headers = rows[0];
            allRecords = [];
            
            for (let i = 1; i < rows.length; i++) {
                const record = {};
                for (let j = 0; j < headers.length; j++) {
                    record[headers[j]] = rows[i][j] || '';
                }
                allRecords.push(record);
            }
            
            hideGlobalLoading();
            Swal.fire({ icon: 'success', title: 'Loaded!', text: `${allRecords.length} records found (read-only)`, timer: 1500, showConfirmButton: false });
            return true;
            
        } catch(error) {
            hideGlobalLoading();
            Swal.fire({ icon: 'error', title: 'Connection Error', text: error.message });
            return false;
        }
    }
    
    // Find record by BR Code
    function findRecordByBRCode(brCode) {
        if (!brCode || !allRecords.length) return null;
        const searchBr = brCode.toString().trim().toLowerCase();
        
        for (const record of allRecords) {
            const recordBr = (record.BRCode || record.brCode || record['BR Code'] || '').toString().trim().toLowerCase();
            if (recordBr === searchBr) {
                return record;
            }
        }
        return null;
    }
    
    // Update record via Apps Script (same pattern as menu-list.html)
    async function updateRecord(updatedFields) {
        const brValue = currentRecord.BRCode || currentRecord.brCode || currentRecord['BR Code'];
        
        const payload = {
            action: "UPDATE",
            brCode: brValue,
            ...updatedFields
        };
        
        const $btn = $("#submitUpdateBtn");
        const origHtml = $btn.html();
        setButtonLoading($btn, true, origHtml);
        
        try {
            const response = await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();
            
            if (result.success) {
                Swal.fire({ icon: 'success', title: 'Updated!', text: result.message, timer: 2000, showConfirmButton: false });
                return true;
            } else {
                Swal.fire({ icon: 'error', title: 'Update Failed', text: result.error });
                return false;
            }
        } catch(error) {
            Swal.fire({ icon: 'error', title: 'Error', text: error.message });
            return false;
        } finally {
            setButtonLoading($btn, false, origHtml);
        }
    }
    
    // Render treasury details
    function renderTreasuryDetails() {
        const container = $('#treasuryContent');
        
        if (!currentRecord) {
            container.html(`
                <div class="empty-state">
                    <i class="bi bi-search" style="font-size: 3rem; opacity: 0.5;"></i>
                    <p style="margin-top: 1rem;">No treasury record found for BR Code: <strong>${$('#currentBrCode').text()}</strong></p>
                    <p class="text-muted">Please check the BR Code or click Refresh.</p>
                </div>
            `);
            return;
        }
        
        const displayFields = [
            { label: "Treasury", sheetColumn: "Treasury", editable: false },
            { label: "District", sheetColumn: "District", editable: false },
            { label: "Network Admin Name", sheetColumn: "Network Admin Name", editable: false },
            { label: "Network Admin Contact", sheetColumn: "Network Admin Contact", editable: false },
            { label: "Treasury Admin Name", sheetColumn: "Treasury Admin Name", editable: true, fieldKey: "treasuryAdminName" },
            { label: "Treasury Admin Contact", sheetColumn: "Treasury Admin Contact", editable: true, fieldKey: "treasuryAdminContact" },
            { label: "Office Mail ID", sheetColumn: "Office Mail ID", editable: true, fieldKey: "officeMailId" },
            { label: "Office Contact", sheetColumn: "Office Contact", editable: true, fieldKey: "officeContact" },
            { label: "Office Mobile", sheetColumn: "Office Mobile", editable: true, fieldKey: "officeMobile" },
            { label: "BR Code", sheetColumn: "BRCode", editable: false }
        ];
        
        let html = `
            <div class="treasury-card">
                <div class="card-header">
                    <h5><i class="bi bi-building"></i> Treasury Information</h5>
                    <div>
                        ${!editMode ? '<button id="enableEditBtn" class="btn-warning-custom"><i class="bi bi-pencil"></i> Enable Editing</button>' : ''}
                        ${editMode ? '<button id="cancelEditBtn" class="btn-secondary-custom"><i class="bi bi-x-circle"></i> Cancel</button>' : ''}
                        ${editMode ? '<button id="submitUpdateBtn" class="btn-primary-custom"><i class="bi bi-cloud-upload"></i> Update</button>' : ''}
                    </div>
                </div>
        `;
        
        for (const field of displayFields) {
            let value = currentRecord[field.sheetColumn] || '—';
            const isEditing = editMode && field.editable;
            
            html += `
                <div class="info-row">
                    <div class="info-label">${field.label}</div>
                    <div class="info-value">
                        ${!isEditing ? `<span>${escapeHtml(value)}</span>` : `<input type="text" class="edit-input" data-sheetcolumn="${field.sheetColumn}" data-fieldkey="${field.fieldKey || ''}" value="${escapeHtml(value)}">`}
                        ${!editMode && field.editable ? '<span class="badge-locked"><i class="bi bi-lock"></i> Locked</span>' : ''}
                    </div>
                </div>
            `;
        }
        
        html += `</div>`;
        container.html(html);
        
        if (editMode) {
            $('#cancelEditBtn').on('click', cancelEditMode);
            $('#submitUpdateBtn').on('click', submitUpdate);
            
            $('.edit-input').on('input', function() {
                const sheetColumn = $(this).data('sheetcolumn');
                currentRecord[sheetColumn] = $(this).val();
            });
        } else {
            $('#enableEditBtn').on('click', enableEditMode);
        }
    }
    
    function enableEditMode() {
        if (!currentRecord) return;
        
        // Save original values
        const editableFields = ["Treasury Admin Name", "Treasury Admin Contact", "Office Mail ID", "Office Contact", "Office Mobile"];
        originalValues = {};
        editableFields.forEach(field => {
            originalValues[field] = currentRecord[field];
        });
        
        editMode = true;
        renderTreasuryDetails();
        Swal.fire({ icon: 'info', title: 'Edit Mode Enabled', text: 'Modify fields, then click "Update".', timer: 2000, showConfirmButton: false });
    }
    
    function cancelEditMode() {
        // Restore original values
        const editableFields = ["Treasury Admin Name", "Treasury Admin Contact", "Office Mail ID", "Office Contact", "Office Mobile"];
        editableFields.forEach(field => {
            if (originalValues[field] !== undefined) {
                currentRecord[field] = originalValues[field];
            }
        });
        
        editMode = false;
        renderTreasuryDetails();
        Swal.fire({ icon: 'info', title: 'Cancelled', text: 'Changes discarded.', timer: 1000, showConfirmButton: false });
    }
    
    async function submitUpdate() {
        // Collect changed fields
        const updatedFields = {};
        const changes = [];
        
        const editableFields = [
            { sheetColumn: "Treasury Admin Name", fieldKey: "treasuryAdminName" },
            { sheetColumn: "Treasury Admin Contact", fieldKey: "treasuryAdminContact" },
            { sheetColumn: "Office Mail ID", fieldKey: "officeMailId" },
            { sheetColumn: "Office Contact", fieldKey: "officeContact" },
            { sheetColumn: "Office Mobile", fieldKey: "officeMobile" }
        ];
        
        editableFields.forEach(field => {
            const currentValue = currentRecord[field.sheetColumn] || '';
            const originalValue = originalValues[field.sheetColumn] || '';
            
            if (currentValue !== originalValue) {
                updatedFields[field.fieldKey] = currentValue;
                changes.push(`${field.sheetColumn}: "${originalValue}" → "${currentValue}"`);
            }
        });
        
        if (Object.keys(updatedFields).length === 0) {
            Swal.fire({ icon: 'warning', title: 'No Changes', text: 'No modifications were made to any field.' });
            return;
        }
        
        const success = await updateRecord(updatedFields);
        
        if (success) {
            // Update local cache
            const brValue = currentRecord.BRCode || currentRecord.brCode || currentRecord['BR Code'];
            const index = allRecords.findIndex(r => (r.BRCode || r.brCode || r['BR Code']) === brValue);
            if (index !== -1) {
                allRecords[index] = { ...currentRecord };
            }
            editMode = false;
            renderTreasuryDetails();
        }
    }
    
    async function loadAndDisplay(brCode) {
        if (!brCode) {
            $('#currentBrCode').text('Not found');
            currentRecord = null;
            renderTreasuryDetails();
            return;
        }
        
        $('#currentBrCode').text(brCode);
        
        if (allRecords.length === 0) {
            const success = await fetchTreasuryData();
            if (!success) return;
        }
        
        const record = findRecordByBRCode(brCode);
        if (record) {
            currentRecord = { ...record };
            editMode = false;
            renderTreasuryDetails();
            Swal.fire({ icon: 'success', title: 'Found!', text: `${currentRecord.Treasury || 'Treasury'} / ${currentRecord.District || ''}`, timer: 1500, showConfirmButton: false });
        } else {
            currentRecord = null;
            renderTreasuryDetails();
            Swal.fire({ icon: 'error', title: 'Not Found', text: `No record found for BR Code: ${brCode}` });
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
    }
    
    // Event handlers
    $('#manualFetchBtn').on('click', () => {
        const manualBr = $('#manualBrInput').val().trim();
        if (manualBr) {
            loadAndDisplay(manualBr);
        } else {
            Swal.fire({ icon: 'warning', title: 'Empty', text: 'Please enter a BR Code' });
        }
    });
    
    $('#refreshDataBtn').on('click', async () => {
        allRecords = [];
        await fetchTreasuryData();
        const currentBr = $('#currentBrCode').text();
        if (currentBr && currentBr !== 'Not found') {
            loadAndDisplay(currentBr);
        }
    });
    
    // Initialize
    $(document).ready(async function() {
        // Check if Apps Script URL is configured
        if (APPS_SCRIPT_URL === "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec") {
            Swal.fire({ 
                icon: 'warning', 
                title: 'Configuration Required', 
                text: 'Please update APPS_SCRIPT_URL with your Google Apps Script Web App URL.',
                confirmButtonText: 'OK'
            });
        }
        
        await fetchTreasuryData();
        const cachedBr = getBRCodeFromCache();
        if (cachedBr) {
            loadAndDisplay(cachedBr);
        } else {
            $('#currentBrCode').text('Not found');
            Swal.fire({ 
                icon: 'info', 
                title: 'No BR Code Detected', 
                text: 'Please enter a BR Code manually.',
                confirmButtonText: 'OK'
            });
        }
    });
</script>
</body>
</html>
