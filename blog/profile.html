<!-- profile.html - Author Profile Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Author Profile - Blog Studio</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-icons.min.css">
	 <!-- Custom Blog CSS  -->
    <link rel="stylesheet" href="css/blog.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --gray-bg: #f8fafc;
            --card-border: #e2e8f0;
        }
        body {
            background: var(--gray-bg);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
    </style>
</head>
<body>

<header id="main-header"></header>

<div class="profile-header"></div>

<main class="container py-4">
    <!-- Profile Card -->
    <div class="profile-card" id="profileCard">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Loading profile...</p>
        </div>
    </div>

    <!-- Author's Posts Section -->
    <div class="mt-5">
        <h3 class="fw-semibold mb-4"><i class="bi bi-file-text"></i> Articles by <span id="authorNameSpan"></span></h3>
        <div class="row g-4" id="postsGrid"></div>
        <div id="loadMoreTrigger" class="load-more-trigger">
            <button class="btn btn-outline-primary rounded-pill px-4" id="loadMoreBtn">Load more</button>
        </div>
        <div id="noMoreMsg" class="text-center text-muted small d-none">✨ No more posts</div>
    </div>
</main>

<footer class="py-4 mt-5">
    <div class="container text-center text-muted small">
        <i class="bi bi-dot"></i> Powered by IT Cell Treasury
    </div>
</footer>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="config.js"></script>
<script>
    let authorPosts = [];
    let authorInfo = null;
    let currentLimit = 6;
    
    function extractFirstImage(html) {
        if (!html) return 'https://placehold.co/600x400/e2e8f0/64748b?text=No+Image';
        const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
        return match ? match[1] : 'https://placehold.co/600x400/e2e8f0/64748b?text=Blog+Image';
    }
    
    function stripHtml(html) {
        let temp = document.createElement("div");
        temp.innerHTML = html;
        return temp.textContent || temp.innerText || "";
    }
    
    function navigateToPost(postId) {
        localStorage.setItem('blogPostId', postId);
        window.location.href = 'post.html';
    }
    
    function navigateToCategory(category) {
        localStorage.setItem('selectedCategory', category);
        window.location.href = 'category.html';
    }
    
    async function loadHeaderConfig() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/configure!A:F?key=${CONFIG.API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            let blogTitle = "Blog Studio", logoUrl = "";
            let menuItems = [];
            for(let i=1; i<rows.length; i++) {
                let row = rows[i];
                let item = row[0]?.trim(), configVal = row[1]?.trim(), menu = row[2]?.trim(), sub = row[3]?.trim(), linkItem = row[4]?.trim(), link = row[5]?.trim();
                if(item === "Blog Title" && configVal) blogTitle = configVal;
                if(item === "Blog logo(url)" && configVal) logoUrl = configVal;
                if(menu && menu !== "Menu") {
                    let existing = menuItems.find(m => m.name === menu);
                    if(!existing) {
                        existing = { name: menu, subItems: [] };
                        menuItems.push(existing);
                    }
                    if(sub && sub !== "Sub Menu" && linkItem && link) {
                        existing.subItems.push({ label: sub, url: link });
                    } else if (linkItem && link && (!sub || sub === "Sub Menu")) {
                        existing.subItems.push({ label: linkItem, url: link });
                    }
                }
            }
            renderHeader(blogTitle, logoUrl, menuItems);
        } catch(e) { renderHeader("Blog Studio", "", []); }
    }
    
    function renderHeader(title, logoUrl, menus) {
        let logoHtml = logoUrl ? `<img src="${logoUrl}" height="35" alt="logo">` : `<i class="bi bi-journal-bookmark-fill fs-3" style="color:#4f46e5"></i>`;
        let navHtml = `<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top px-3 px-md-5 py-2 shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="./index.html">${logoHtml} ${title}</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#blogNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="blogNavbar">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2">`;
        menus.forEach(menu => {
            if(menu.subItems.length) {
                navHtml += `<li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">${menu.name}</a><ul class="dropdown-menu">`;
                menu.subItems.forEach(sub => { navHtml += `<li><a class="dropdown-item" href="${sub.url}">${sub.label}</a></li>`; });
                navHtml += `</ul></li>`;
            } else {
                navHtml += `<li class="nav-item"><a class="nav-link" href="#">${menu.name}</a></li>`;
            }
        });
        navHtml += `</ul></div></div></nav>`;
        document.getElementById('main-header').innerHTML = navHtml;
    }
    
    async function fetchAuthorProfile(authorName) {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/profiles!A:D?key=${CONFIG.API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            const rows = data.values || [];
            
            for(let i=1; i<rows.length; i++) {
                if(rows[i][0] && rows[i][0].trim().toLowerCase() === authorName.toLowerCase()) {
                    return {
                        name: rows[i][0],
                        designation: rows[i][1] || '',
                        about: rows[i][2] || '',
                        imageUrl: rows[i][3] || null
                    };
                }
            }
            // Return default if not found
            return {
                name: authorName,
                designation: '',
                about: 'No additional information available.',
                imageUrl: null
            };
        } catch(error) {
            console.error('Error fetching profile:', error);
            return {
                name: authorName,
                designation: '',
                about: 'Unable to load profile information.',
                imageUrl: null
            };
        }
    }
    
    async function fetchPostsByAuthor(authorName) {
        const blogUrl = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/blog%20data!A:I?key=${CONFIG.API_KEY}`;
        const response = await fetch(blogUrl);
        const data = await response.json();
        const rows = data.values || [];
        if(rows.length < 2) return [];
        
        const posts = [];
        for(let i=1; i<rows.length; i++) {
            let row = rows[i];
            let postAuthor = row[3] || "Anonymous";
            if(postAuthor.trim().toLowerCase() === authorName.toLowerCase()) {
                posts.push({
                    id: row[0],
                    category: row[1] || "General",
                    tags: row[2] || "",
                    author: postAuthor,
                    publishedTime: row[4] || "",
                    title: row[5] || "Untitled",
                    content: row[6] || "",
                    likeCount: parseInt(row[7]) || 0,
                    shareCount: parseInt(row[8]) || 0,
                    image: extractFirstImage(row[6] || "")
                });
            }
        }
        posts.sort((a,b) => parseInt(b.id) - parseInt(a.id));
        return posts;
    }
    
    function renderProfileCard(profile) {
        const initials = profile.name.charAt(0).toUpperCase();
        const imageHtml = profile.imageUrl 
            ? `<img src="${profile.imageUrl}" class="profile-image" alt="${escapeHtml(profile.name)}" onerror="this.src='https://placehold.co/150x150/4f46e5/white?text=${initials}'">`
            : `<div class="profile-image d-flex align-items-center justify-content-center bg-primary text-white" style="font-size: 4rem; font-weight: 600;">${initials}</div>`;
        
        document.getElementById("profileCard").innerHTML = `
            ${imageHtml}
            <h1 class="profile-name">${escapeHtml(profile.name)}</h1>
            ${profile.designation ? `<div class="profile-designation"><i class="bi bi-briefcase"></i> ${escapeHtml(profile.designation)}</div>` : ''}
            <div class="profile-about">
                <i class="bi bi-quote"></i> ${escapeHtml(profile.about)}
            </div>
        `;
        document.getElementById("authorNameSpan").innerText = profile.name;
    }
    
    function renderPosts(postsToShow) {
        const container = document.getElementById("postsGrid");
        container.innerHTML = postsToShow.map(p => `
            <div class="col-md-4 col-lg-3">
                <div class="card-blog h-100 p-3" onclick="navigateToPost('${p.id}')">
                    <img src="${p.image}" class="card-img-top rounded-3" style="height:180px; object-fit:cover;" onerror="this.src='https://placehold.co/600x400/e2e8f0/64748b?text=No+Image'">
                    <div class="card-body px-0 mt-2">
                        <span class="category-badge" data-category="${escapeHtml(p.category)}">${escapeHtml(p.category)}</span>
                        <h5 class="fw-bold mt-2">${escapeHtml(p.title)}</h5>
                        <div class="small text-muted"><i class="bi bi-calendar"></i> ${escapeHtml(p.publishedTime)}</div>
                        <p class="mt-2 small text-secondary">${escapeHtml(stripHtml(p.content).substring(0,100))}...</p>
                        <button class="btn btn-primary-custom mt-2 w-100">Read more →</button>
                    </div>
                </div>
            </div>
        `).join('');
        
        // Add category click handlers
        document.querySelectorAll(".category-badge").forEach(badge => {
            badge.addEventListener("click", (e) => {
                e.stopPropagation();
                navigateToCategory(badge.getAttribute("data-category"));
            });
        });
    }
    
    function loadMorePosts() {
        currentLimit += 6;
        const postsToShow = authorPosts.slice(0, currentLimit);
        renderPosts(postsToShow);
        
        if(currentLimit >= authorPosts.length) {
            document.getElementById("loadMoreBtn").style.display = "none";
            document.getElementById("noMoreMsg").classList.remove("d-none");
        }
    }
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
    }
    
    async function initProfilePage() {
        await loadHeaderConfig();
        
        // Get author name from session storage
        let authorName = sessionStorage.getItem('profileAuthorName');
        let authorDesignation = sessionStorage.getItem('profileAuthorDesignation') || '';
        
        if(!authorName) {
            document.getElementById("profileCard").innerHTML = `
                <div class="error-box">
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle-fill"></i><br>
                        <strong>No author selected!</strong><br>
                        Please go back to a <a href="./index.html">post</a> and click on an author's name.
                    </div>
                </div>`;
            return;
        }
        
        try {
            // Fetch profile and posts
            const profile = await fetchAuthorProfile(authorName);
            if(profile.designation === '' && authorDesignation) {
                profile.designation = authorDesignation;
            }
            authorInfo = profile;
            renderProfileCard(profile);
            
            authorPosts = await fetchPostsByAuthor(authorName);
            
            if(authorPosts.length === 0) {
                document.getElementById("postsGrid").innerHTML = `
                    <div class="col-12 text-center p-5">
                        <div class="alert alert-info">No posts found from this author yet.</div>
                    </div>`;
                document.getElementById("loadMoreTrigger").style.display = "none";
                return;
            }
            
            renderPosts(authorPosts.slice(0, currentLimit));
            document.getElementById("loadMoreBtn").onclick = loadMorePosts;
            
            if(authorPosts.length <= currentLimit) {
                document.getElementById("loadMoreBtn").style.display = "none";
            }
        } catch(error) {
            console.error("Profile init error:", error);
            document.getElementById("profileCard").innerHTML = `
                <div class="error-box">
                    <div class="alert alert-danger">Error loading profile: ${error.message}</div>
                </div>`;
        }
    }
    
    // Make functions global for onclick
    window.navigateToPost = navigateToPost;
    window.navigateToCategory = navigateToCategory;
    
    initProfilePage();
</script>
</body>
</html>
