<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Branch Communication Hub | Team Chat</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            max-width: 1400px;
            margin: 20px auto;
            height: calc(100vh - 40px);
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .branch-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
        }
        
        .online-status {
            display: inline-flex;
            align-items: center;
            margin-left: 15px;
            font-size: 0.8rem;
        }
        
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #4ade80;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
            }
            70% {
                box-shadow: 0 0 0 6px rgba(74, 222, 128, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
            }
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeInUp 0.3s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Messages sent by current branch - right side */
        .message-own {
            justify-content: flex-end;
        }
        
        /* Messages from other branches - left side */
        .message-other {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 60%;
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
        }
        
        /* Own messages - gradient background */
        .message-own .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        /* Other messages - white background */
        .message-other .message-bubble {
            background: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        
        .message-branch {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .message-text {
            font-size: 0.95rem;
            word-wrap: break-word;
        }
        
        .message-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
            font-size: 0.7rem;
            opacity: 0.7;
        }
        
        .tick-mark {
            font-size: 0.75rem;
        }
        
        .tick-sent { color: #9ca3af; }
        .tick-delivered { color: #9ca3af; }
        .tick-read { color: #60a5fa; }
        
        .reply-indicator {
            background: rgba(0,0,0,0.05);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            border-left: 3px solid #667eea;
        }
        
        .reply-btn {
            background: none;
            border: none;
            font-size: 0.7rem;
            margin-top: 5px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        .reply-btn:hover {
            opacity: 1;
        }
        
        .message-other .reply-btn {
            color: #667eea;
        }
        
        .message-own .reply-btn {
            color: white;
        }
        
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .reply-preview {
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: none;
            font-size: 0.85rem;
            position: relative;
        }
        
        .reply-preview.active {
            display: block;
        }
        
        .cancel-reply {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            color: #999;
        }
        
        .input-group {
            gap: 10px;
        }
        
        .form-control {
            border-radius: 25px;
            border: 2px solid #e0e0e0;
            resize: none;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: none;
        }
        
        .send-btn {
            border-radius: 25px;
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: 600;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .status-badge {
            background: #28a745;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 10px;
        }
        
        .replied-badge {
            background: #6c757d;
        }
        
        .new-badge {
            background: #ffc107;
            color: #000;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 20px;
        }
        
        .active-users-panel {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 10px 20px;
            font-size: 0.85rem;
        }
        
        .active-user {
            display: inline-flex;
            align-items: center;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px;
        }
        
        .active-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4ade80;
            margin-right: 6px;
        }
        
        @media (max-width: 768px) {
            .chat-container {
                margin: 0;
                height: 100vh;
                border-radius: 0;
            }
            
            .message-bubble {
                max-width: 80%;
            }
            
            .chat-header {
                padding: 15px 20px;
            }
        }
        
        .auto-refresh-indicator {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.8);
            margin-left: 10px;
        }
        
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 9999;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .status-online {
            background: #28a745;
            color: white;
        }
        
        .status-offline {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h4 class="mb-1"><i class="bi bi-chat-dots-fill"></i> Branch Communication Hub</h4>
                <div class="branch-badge">
                    <i class="bi bi-building"></i> Branch: <span id="branchCodeDisplay">Loading...</span>
                </div>
                <div class="online-status">
                    <span class="online-dot"></span>
                    <span id="onlineStatusText">Online</span>
                </div>
            </div>
            <div>
                <span class="auto-refresh-indicator">
                    <i class="bi bi-arrow-repeat"></i> Auto-refresh: <span id="countdown">30</span>s
                </span>
            </div>
        </div>
    </div>
    
    <div class="active-users-panel" id="activeUsersPanel">
        <small><i class="bi bi-people-fill"></i> Active branches: <span id="activeCount">0</span></small>
        <div id="activeUsersList"></div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading messages...</span>
            </div>
            <p class="mt-2">Loading messages...</p>
        </div>
    </div>
    
    <div class="chat-input-area">
        <div class="reply-preview" id="replyPreview">
            <i class="bi bi-reply-fill"></i> Replying to: <span id="replyToBranch"></span>
            <br><small id="replyToMessage"></small>
            <span class="cancel-reply" onclick="cancelReply()">✕</span>
        </div>
        
        <div class="input-group">
            <textarea class="form-control" id="messageInput" rows="2" placeholder="Type your message here... (Press Enter to send)"></textarea>
            <button class="btn btn-primary send-btn" id="sendBtn">
                <i class="bi bi-send-fill"></i> Send
            </button>
        </div>
    </div>
</div>

<div id="connectionStatus" class="connection-status status-online">🟢 Online</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // ======================== CONFIGURATION ========================
    const SPREADSHEET_ID = "1fkiFo1i60NxA_ujl1GhPmNnSLKI6seb3YiMVhPxZjgM"; // Replace with your Google Sheet ID
    const SHEET_NAME = "Chats"; // Your sheet name
    const API_KEY = "AIzaSyBAuS3Brpsw5JOJnjNJii1UlFa7ClXf8d4";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDg9KYO7JjoWNUVZAPMvwTTmYWW9q4rQZy0_DOtryBwfGA5o72-YWiiNY6sByBZwzv1w/exec"; // Replace with your Apps Script URL
    const REFRESH_INTERVAL = 30000; // 30 seconds
    const HEARTBEAT_INTERVAL = 5000; // 5 seconds - update online status
    
    // Global variables
    let branchCode = null;
    let messages = [];
    let refreshTimer = null;
    let countdownInterval = null;
    let heartbeatTimer = null;
    let replyingTo = null;
    let lastMessageCount = 0;
    let activeBranches = new Map(); // Store active branches and their last seen time
    let isWindowActive = true;
    
    // ======================== GET BRANCH FROM STORAGE ========================
    function getBranchFromStorage() {
        let branch = null;
        
        const sessionUser = sessionStorage.getItem('currentUser');
        if (sessionUser) {
            try {
                const userData = JSON.parse(sessionUser);
                branch = userData.username || userData.branch || userData.branchCode;
                console.log("Branch from sessionStorage:", branch);
            } catch (e) {
                console.error('Error parsing session user:', e);
            }
        }
        
        if (!branch) {
            const localUser = localStorage.getItem('currentUser');
            if (localUser) {
                try {
                    const userData = JSON.parse(localUser);
                    branch = userData.username || userData.branch || userData.branchCode;
                    console.log("Branch from localStorage:", branch);
                } catch (e) {
                    console.error('Error parsing local user:', e);
                }
            }
        }
        
        if (!branch) {
            branch = localStorage.getItem('selectedBranch');
            console.log("Branch from selectedBranch:", branch);
        }
        
        if (!branch || branch === 'null' || branch === 'undefined') {
            branch = prompt("Please enter your branch code (e.g., BR001):", "BR001");
            if (branch) {
                localStorage.setItem('selectedBranch', branch);
            }
        }
        
        return branch;
    }
    
    // ======================== UPDATE ONLINE STATUS (HEARTBEAT) ========================
    async function updateHeartbeat() {
        if (!branchCode) return;
        
        try {
            const payload = {
                action: "HEARTBEAT",
                branchCode: branchCode,
                timestamp: new Date().toISOString(),
                isActive: isWindowActive
            };
            
            await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            console.log("Heartbeat sent for branch:", branchCode);
        } catch (error) {
            console.error("Error sending heartbeat:", error);
        }
    }
    
    // ======================== GET ACTIVE BRANCHES ========================
    async function getActiveBranches() {
        try {
            const range = `${SHEET_NAME}!H:I`; // Store active status in columns H and I
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            
            const now = new Date();
            const activeThreshold = 30000; // 30 seconds threshold for active status
            
            if (data.values && data.values.length > 1) {
                activeBranches.clear();
                for (let i = 1; i < data.values.length; i++) {
                    const row = data.values[i];
                    if (row.length >= 2) {
                        const lastSeen = new Date(row[1]);
                        const timeDiff = now - lastSeen;
                        if (timeDiff < activeThreshold) {
                            activeBranches.set(row[0], {
                                lastSeen: lastSeen,
                                isActive: true
                            });
                        }
                    }
                }
            }
            
            updateActiveUsersDisplay();
        } catch (error) {
            console.error("Error getting active branches:", error);
        }
    }
    
    function updateActiveUsersDisplay() {
        const activeList = $('#activeUsersList');
        const activeCount = $('#activeCount');
        
        activeCount.text(activeBranches.size);
        
        if (activeBranches.size === 0) {
            activeList.html('<small class="text-muted">No other branches active</small>');
        } else {
            let html = '';
            for (let [branch, data] of activeBranches) {
                if (branch !== branchCode) {
                    html += `
                        <div class="active-user">
                            <span class="active-dot"></span>
                            ${escapeHtml(branch)}
                        </div>
                    `;
                }
            }
            if (html === '') {
                html = '<small class="text-muted">Only you are active</small>';
            }
            activeList.html(html);
        }
    }
    
    // ======================== READ MESSAGES FROM GOOGLE SHEET ========================
    async function readMessagesFromSheet() {
        if (!branchCode) return [];
        
        try {
            const range = `${SHEET_NAME}!A:J`; // Added columns for status tracking
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data.values || data.values.length <= 1) {
                return [];
            }
            
            const rows = data.values.slice(1);
            const allMessages = [];
            
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (row.length >= 5 && row[0]) {
                    allMessages.push({
                        id: parseInt(row[0]),
                        branchCode: row[1] || "",
                        message: row[2] || "",
                        timestamp: row[3] || "",
                        replyToId: row[4] ? parseInt(row[4]) : 0,
                        replyMessage: row[5] || "",
                        status: row[6] || "New",
                        delivered: row[7] === "TRUE",
                        read: row[8] === "TRUE",
                        readBy: row[9] || ""
                    });
                }
            }
            
            allMessages.sort((a, b) => {
                if (!a.timestamp) return 1;
                if (!b.timestamp) return -1;
                return new Date(a.timestamp) - new Date(b.timestamp);
            });
            
            // Filter messages for current branch
            const relevantMessages = allMessages.filter(msg => {
                const isOwnMessage = msg.branchCode === branchCode;
                const isReply = msg.replyToId > 0;
                const isReplyToMe = isReply && allMessages.find(m => m.id === msg.replyToId)?.branchCode === branchCode;
                const isNewMessageFromOther = !isOwnMessage && msg.replyToId === 0 && msg.status !== "Replied";
                
                return isOwnMessage || isReplyToMe || isNewMessageFromOther;
            });
            
            // Mark messages as read if current branch sees them
            for (let msg of relevantMessages) {
                if (!msg.isOwnMessage && !msg.read && !msg.readBy.includes(branchCode)) {
                    await markAsRead(msg.id);
                }
            }
            
            return relevantMessages.map(msg => ({
                ...msg,
                isOwnMessage: msg.branchCode === branchCode,
                canReply: msg.branchCode !== branchCode && msg.replyToId === 0 && msg.status !== "Replied",
                messageStatus: getMessageStatus(msg, branchCode)
            }));
            
        } catch (error) {
            console.error("Error reading messages:", error);
            return [];
        }
    }
    
    function getMessageStatus(message, currentBranch) {
        if (message.branchCode !== currentBranch) return null;
        
        if (message.read && message.readBy) {
            return { type: 'read', icon: 'bi-check2-all', color: '#60a5fa', text: 'Seen' };
        } else if (message.delivered) {
            return { type: 'delivered', icon: 'bi-check2-all', color: '#9ca3af', text: 'Delivered' };
        } else {
            return { type: 'sent', icon: 'bi-check2', color: '#9ca3af', text: 'Sent' };
        }
    }
    
    async function markAsRead(messageId) {
        try {
            const payload = {
                action: "MARK_READ",
                messageId: messageId,
                branchCode: branchCode,
                timestamp: new Date().toISOString()
            };
            
            await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
        } catch (error) {
            console.error("Error marking as read:", error);
        }
    }
    
    // ======================== SEND MESSAGE ========================
    async function sendMessage(message, replyToId = null) {
        if (!message.trim()) {
            Swal.fire({
                icon: 'warning',
                title: 'Empty Message',
                text: 'Please enter a message to send',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000
            });
            return false;
        }
        
        const action = replyToId ? "REPLY_MESSAGE" : "SEND_MESSAGE";
        const payload = {
            action: action,
            branchCode: branchCode,
            message: message.trim(),
            timestamp: new Date().toISOString(),
            status: "Sent"
        };
        
        if (replyToId) {
            payload.replyToId = replyToId;
        }
        
        try {
            await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            $('#messageInput').val('');
            cancelReply();
            
            setTimeout(async () => {
                await loadMessages();
                scrollToBottom();
            }, 1000);
            
            return true;
            
        } catch (error) {
            console.error("Error sending message:", error);
            Swal.fire({
                icon: 'error',
                title: 'Send Failed',
                text: 'Unable to send message',
                confirmButtonColor: '#667eea'
            });
            return false;
        }
    }
    
    // ======================== FORMAT DATE AND TIME ========================
    function formatDateTime(timestamp) {
        if (!timestamp) return 'Invalid date';
        
        const date = new Date(timestamp);
        
        // Format: DD/MM/YYYY
        const day = date.getDate().toString().padStart(2, '0');
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const year = date.getFullYear();
        const formattedDate = `${day}/${month}/${year}`;
        
        // Format time: 12-hour format with AM/PM
        let hours = date.getHours();
        const minutes = date.getMinutes().toString().padStart(2, '0');
        const seconds = date.getSeconds().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; // Convert 0 to 12
        const formattedTime = `${hours}:${minutes}:${seconds} ${ampm}`;
        
        return `${formattedDate} at ${formattedTime}`;
    }
    
    // ======================== RENDER MESSAGES ========================
    function renderMessages() {
        const container = $('#chatMessages');
        
        if (!messages || messages.length === 0) {
            container.html(`
                <div class="text-center text-muted" style="padding: 50px;">
                    <i class="bi bi-chat-square-text" style="font-size: 48px;"></i>
                    <h5 class="mt-3">No messages yet</h5>
                    <p>Be the first to start a conversation!</p>
                </div>
            `);
            return;
        }
        
        let html = '';
        
        messages.forEach(message => {
            const isOwn = message.isOwnMessage;
            const formattedDateTime = formatDateTime(message.timestamp);
            const isReply = message.replyToId > 0;
            const messageStatus = message.messageStatus;
            
            // Get the original message text if this is a reply
            let originalMessageText = '';
            if (isReply) {
                const originalMsg = messages.find(m => m.id === message.replyToId);
                if (originalMsg) {
                    originalMessageText = originalMsg.message;
                }
            }
            
            html += `
                <div class="message ${isOwn ? 'message-own' : 'message-other'}">
                    <div class="message-bubble">
                        <div class="message-branch">
                            <i class="bi bi-building"></i> ${escapeHtml(message.branchCode)}
                            ${message.status === 'Replied' ? '<span class="status-badge replied-badge"><i class="bi bi-check-all"></i> Replied</span>' : ''}
                            ${!isOwn && message.canReply ? '<span class="status-badge new-badge"><i class="bi bi-chat"></i> Need Reply</span>' : ''}
                        </div>
                        ${isReply ? `
                            <div class="reply-indicator">
                                <i class="bi bi-reply-fill"></i> Replying to: "${escapeHtml(originalMessageText.substring(0, 100))}"
                            </div>
                        ` : ''}
                        <div class="message-text">
                            ${escapeHtml(message.message)}
                            ${message.replyMessage ? `<br><small><i class="bi bi-reply"></i> Reply: ${escapeHtml(message.replyMessage)}</small>` : ''}
                        </div>
                        <div class="message-footer">
                            <span class="message-time">${formattedDateTime}</span>
                            ${messageStatus ? `
                                <span class="tick-mark">
                                    <i class="${messageStatus.icon}" style="color: ${messageStatus.color}"></i>
                                    <span class="d-none d-sm-inline"> ${messageStatus.text}</span>
                                </span>
                            ` : ''}
                            ${!isOwn && message.canReply ? `
                                <button class="reply-btn" onclick="startReply(${message.id}, '${escapeHtml(message.branchCode)}', '${escapeHtml(message.message.substring(0, 50))}')">
                                    <i class="bi bi-reply-fill"></i> Reply
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.html(html);
    }
    
    // ======================== LOAD MESSAGES ========================
    async function loadMessages() {
        if (!branchCode) return;
        
        try {
            const newMessages = await readMessagesFromSheet();
            
            // Check if messages have changed (by ID and content)
            const hasNewMessages = JSON.stringify(messages) !== JSON.stringify(newMessages);
            
            messages = newMessages;
            
            renderMessages();
            
            if (hasNewMessages) {
                scrollToBottom();
            }
            
            updateConnectionStatus(true);
            await getActiveBranches();
            
        } catch (error) {
            console.error("Error loading messages:", error);
            updateConnectionStatus(false);
        }
    }
    
    // ======================== HELPER FUNCTIONS ========================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function scrollToBottom() {
        const messagesDiv = document.getElementById('chatMessages');
        if (messagesDiv) {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    }
    
    function updateConnectionStatus(isOnline) {
        const statusDiv = $('#connectionStatus');
        if (isOnline) {
            statusDiv.removeClass('status-offline').addClass('status-online');
            statusDiv.html('🟢 Online');
            $('#onlineStatusText').text('Online');
        } else {
            statusDiv.removeClass('status-online').addClass('status-offline');
            statusDiv.html('🔴 Offline');
            $('#onlineStatusText').text('Offline');
        }
        
        setTimeout(() => {
            statusDiv.fadeOut('slow', function() {
                statusDiv.fadeIn('slow');
            });
        }, 3000);
    }
    
    // ======================== REPLY FUNCTIONS ========================
    function startReply(messageId, branchCode, messagePreview) {
        replyingTo = messageId;
        $('#replyPreview').addClass('active');
        $('#replyToBranch').text(branchCode);
        $('#replyToMessage').text(messagePreview);
        $('#messageInput').focus();
    }
    
    function cancelReply() {
        replyingTo = null;
        $('#replyPreview').removeClass('active');
        $('#replyToBranch').text('');
        $('#replyToMessage').text('');
    }
    
    // ======================== AUTO REFRESH ========================
    function startAutoRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        if (countdownInterval) clearInterval(countdownInterval);
        
        let countdown = REFRESH_INTERVAL / 1000;
        
        refreshTimer = setInterval(async () => {
            await loadMessages();
            countdown = REFRESH_INTERVAL / 1000;
        }, REFRESH_INTERVAL);
        
        countdownInterval = setInterval(() => {
            countdown--;
            if (countdown >= 0) {
                $('#countdown').text(countdown);
            } else {
                countdown = REFRESH_INTERVAL / 1000;
            }
        }, 1000);
    }
    
    function startHeartbeat() {
        if (heartbeatTimer) clearInterval(heartbeatTimer);
        
        // Send heartbeat immediately
        updateHeartbeat();
        
        heartbeatTimer = setInterval(() => {
            updateHeartbeat();
        }, HEARTBEAT_INTERVAL);
    }
    
    // ======================== SEND BUTTON HANDLER ========================
    async function handleSendMessage() {
        const message = $('#messageInput').val();
        if (!message.trim()) return;
        
        if (replyingTo) {
            await sendMessage(message, replyingTo);
        } else {
            await sendMessage(message);
        }
    }
    
    // ======================== WINDOW FOCUS TRACKING ========================
    function setupWindowFocusTracking() {
        window.addEventListener('focus', () => {
            isWindowActive = true;
            updateHeartbeat();
            loadMessages();
        });
        
        window.addEventListener('blur', () => {
            isWindowActive = false;
            updateHeartbeat();
        });
        
        document.addEventListener('visibilitychange', () => {
            isWindowActive = !document.hidden;
            updateHeartbeat();
            if (isWindowActive) {
                loadMessages();
            }
        });
    }
    
    // ======================== INITIALIZATION ========================
    async function init() {
        branchCode = getBranchFromStorage();
        
        if (!branchCode || branchCode === 'null' || branchCode === 'undefined') {
            $('#branchCodeDisplay').text('Not detected');
            $('#chatMessages').html(`
                <div class="alert alert-danger m-3">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <strong>Branch Not Detected!</strong><br>
                    Please enter your branch code to continue.
                    <br><br>
                    <input type="text" id="manualBranchInput" class="form-control" placeholder="Enter Branch Code (e.g., BR001)">
                    <button class="btn btn-primary mt-2" onclick="setManualBranch()">
                        <i class="bi bi-check"></i> Set Branch
                    </button>
                </div>
            `);
            $('#sendBtn').prop('disabled', true);
            $('#messageInput').prop('disabled', true);
            return;
        }
        
        $('#branchCodeDisplay').text(branchCode);
        console.log("Branch initialized:", branchCode);
        
        await loadMessages();
        startAutoRefresh();
        startHeartbeat();
        setupWindowFocusTracking();
        
        $('#sendBtn').on('click', handleSendMessage);
        $('#messageInput').on('keypress', function(e) {
            if (e.which === 13 && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        });
        
        $('#sendBtn').prop('disabled', false);
        $('#messageInput').prop('disabled', false);
    }
    
    // Manual branch input
    window.setManualBranch = function() {
        const branch = $('#manualBranchInput').val();
        if (branch) {
            localStorage.setItem('selectedBranch', branch);
            location.reload();
        }
    };
    
    // Make functions globally accessible
    window.startReply = startReply;
    window.cancelReply = cancelReply;
    
    // Start the application
    $(document).ready(init);
</script>
</body>
</html>
