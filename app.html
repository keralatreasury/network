    <!-- Mobile/Desktop Redirect Script -->
    <script>
        // Cache management
        const MOBILE_APP_VERSION = "20250113_v1";
        const MOBILE_LAST_CLEAR_DATE_KEY = "mobileLastCacheClearDate";
        
        function clearOldMobileCache() {
            const today = new Date().toDateString();
            const lastClear = localStorage.getItem(MOBILE_LAST_CLEAR_DATE_KEY);
            
            if (lastClear !== today) {
                console.log("Daily mobile cache cleanup triggered for:", today);
                
                // Clear specific caches
                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        for (let name of names) {
                            if (name.includes('network') || name.includes('css') || name.includes('js') || name.includes('mobile')) {
                                caches.delete(name);
                                console.log("Deleted cache:", name);
                            }
                        }
                    });
                }
                
                // Clear localStorage items (except user data)
                const keysToKeep = ['currentUser', 'mobileUser', 'theme', 'notificationSoundEnabled', MOBILE_LAST_CLEAR_DATE_KEY];
                const keysToRemove = [];
                
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!keysToKeep.includes(key)) {
                        keysToRemove.push(key);
                    }
                }
                
                keysToRemove.forEach(key => {
                    localStorage.removeItem(key);
                    console.log("Removed localStorage item:", key);
                });
                
                // Set today as last clear date
                localStorage.setItem(MOBILE_LAST_CLEAR_DATE_KEY, today);
                
                // Force reload if needed
                const urlParams = new URLSearchParams(window.location.search);
                if (!urlParams.has('nocache')) {
                    window.location.href = window.location.pathname + '?nocache=' + Date.now();
                    return true;
                }
            }
            return false;
        }
        
        function checkMobileDailyRefresh() {
            const lastLoginDate = localStorage.getItem('mobileLastLoginDate');
            const today = new Date().toDateString();
            
            if (lastLoginDate !== today) {
                console.log("First login of the day - clearing mobile session cache");
                sessionStorage.clear();
                localStorage.setItem('mobileLastLoginDate', today);
                return true;
            }
            return false;
        }
        
        // Display cache info
        function displayMobileCacheInfo() {
            const infoDiv = document.createElement('div');
            infoDiv.className = 'mobile-cache-info';
            infoDiv.innerHTML = `📦 ${localStorage.getItem(MOBILE_LAST_CLEAR_DATE_KEY) ? 'Cache: ' + new Date(localStorage.getItem(MOBILE_LAST_CLEAR_DATE_KEY)).toLocaleDateString() : 'Cache: Not cleared'} | v${MOBILE_APP_VERSION}`;
            infoDiv.onclick = function() {
                if (confirm('Clear all cache and reload?')) {
                    localStorage.clear();
                    sessionStorage.clear();
                    if ('caches' in window) {
                        caches.keys().then(function(names) {
                            names.forEach(name => caches.delete(name));
                        });
                    }
                    window.location.reload(true);
                }
            };
            document.body.appendChild(infoDiv);
        }
        
        // Run cache management
        clearOldMobileCache();
        checkMobileDailyRefresh();
        
        const currentPage = window.location.pathname.split('/').pop() || 'app.html';
        const isMobile = (window.innerWidth <= 768 || /Mobile|iPhone|iPad|Android/i.test(navigator.userAgent));
        
        if (isMobile && currentPage !== 'app.html') {
            window.location.href = "app.html";
        } else if (!isMobile && currentPage !== 'index.html') {
            window.location.href = "index.html";
        }
    </script>

<script>
    // ========== CONFIGURATION ==========
    const SPREADSHEET_ID = '1jd1xZe9x2mrZm5KAwGT12vMNYjbrnynsmelNKeK95jc';
    const API_KEY = 'AIzaSyBB1V3vJpNZ9X1GIF-YOwoa6YSt_iXMLo0';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxYAM6iuUmr0Sr72N6s7XClG05gOV8mwINpc5f-Ju5ZrmbBD_CZfjfaQeOy3ZoVUX1_/exec';
    const MENU_SHEET = 'Menu';
    const ICON_SHEET = 'icons';
    const LOGIN_SHEET = 'Login';
    const FLASH_SHEET = 'scroll texts';
    
    // Chat configuration for notification system
    const CHAT_SPREADSHEET_ID = "1fkiFo1i60NxA_ujl1GhPmNnSLKI6seb3YiMVhPxZjgM";
    const CHAT_SHEET_NAME = "Chats";
    const CHAT_API_KEY = "AIzaSyBAuS3Brpsw5JOJnjNJii1UlFa7ClXf8d4";
    
    let currentUserData = null;
    let menuStructure = [];
    let iconMap = new Map();
    
    // Notification variables
    let unreadCheckInterval = null;
    let lastUnreadCount = 0;
    let notificationSound = null;
    let soundEnabled = true;
    let audioContext = null;
    let userInteracted = false;
    
    // ========== NOTIFICATION SOUND FUNCTIONS ==========
    function initMobileNotificationSound() {
        try {
            notificationSound = new Audio('./sweet.mp3');
            notificationSound.volume = 0.5;
            notificationSound.load();
            console.log("Mobile notification sound loaded from ./sweet.mp3");
            
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                console.log("Web Audio API context created (suspended)");
            }
        } catch(e) {
            console.log("Audio not supported or file not found:", e);
            notificationSound = null;
        }
    }
    
    function enableMobileAudioOnUserInteraction() {
        if (userInteracted) return;
        userInteracted = true;
        
        console.log("User interaction detected - enabling mobile audio");
        
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume().then(() => {
                console.log("AudioContext resumed successfully");
            }).catch(e => {
                console.log("Failed to resume AudioContext:", e);
            });
        }
        
        if (notificationSound) {
            try {
                notificationSound.volume = 0;
                notificationSound.play().then(() => {
                    notificationSound.pause();
                    notificationSound.currentTime = 0;
                    notificationSound.volume = 0.5;
                    console.log("Audio unlocked via silent playback");
                }).catch(e => {
                    console.log("Silent playback failed:", e);
                });
            } catch(e) {
                console.log("Error unlocking audio:", e);
            }
        }
    }
    
    function setupMobileUserInteractionListener() {
        const events = ['click', 'touchstart', 'keydown', 'mousedown'];
        const handler = function() {
            enableMobileAudioOnUserInteraction();
            events.forEach(event => {
                document.removeEventListener(event, handler);
            });
        };
        
        events.forEach(event => {
            document.addEventListener(event, handler);
        });
    }
    
    function playMobileNotificationSound() {
        if (!soundEnabled) return;
        
        if (notificationSound) {
            try {
                notificationSound.currentTime = 0;
                const playPromise = notificationSound.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log("Mobile notification sound played successfully");
                    }).catch(error => {
                        console.log("Audio play failed:", error.message);
                        playMobileFallbackBeep();
                    });
                }
            } catch(e) {
                console.log("Sound play error:", e);
                playMobileFallbackBeep();
            }
        } else {
            playMobileFallbackBeep();
        }
    }
    
    function playMobileFallbackBeep() {
        if (!userInteracted && (!audioContext || audioContext.state !== 'running')) {
            console.log("Waiting for user interaction before playing beep");
            return;
        }
        
        try {
            let ctx = audioContext;
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                audioContext = ctx;
            }
            
            if (ctx.state === 'suspended') {
                ctx.resume().then(() => {
                    playMobileBeepWithContext(ctx);
                }).catch(e => console.log("Cannot resume AudioContext:", e));
            } else if (ctx.state === 'running') {
                playMobileBeepWithContext(ctx);
            } else {
                const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
                tempCtx.resume().then(() => {
                    playMobileBeepWithContext(tempCtx);
                    setTimeout(() => tempCtx.close(), 500);
                }).catch(e => console.log("Cannot create temp context:", e));
            }
        } catch(e) {
            console.log("Fallback beep failed:", e);
        }
    }
    
    function playMobileBeepWithContext(ctx) {
        try {
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.15;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4);
            oscillator.stop(ctx.currentTime + 0.4);
            console.log("Fallback beep played");
        } catch(e) {
            console.log("Beep playback failed:", e);
        }
    }
    
    function toggleMobileNotificationSound() {
        soundEnabled = !soundEnabled;
        localStorage.setItem('notificationSoundEnabled', soundEnabled);
        
        const soundIcon = document.getElementById('mobileSoundIcon');
        if (soundIcon) {
            soundIcon.className = soundEnabled ? 'bi bi-volume-up-fill' : 'bi bi-volume-mute-fill';
        }
        
        console.log("Mobile notification sound:", soundEnabled ? "Enabled" : "Disabled");
        return soundEnabled;
    }
    
    // ========== GET CURRENT BRANCH/USER FOR CHAT ==========
    function getMobileCurrentBranchForChat() {
        if (currentUserData && currentUserData.username) {
            let username = currentUserData.username.toUpperCase();
            if (/^BR\d{4}$/i.test(username) || username === "ADMIN") {
                return username;
            }
        }
        
        let branch = localStorage.getItem('branchCode');
        if (branch && (/^BR\d{4}$/i.test(branch) || branch === "ADMIN")) {
            return branch.toUpperCase();
        }
        
        branch = localStorage.getItem('selectedBranch');
        if (branch && (/^BR\d{4}$/i.test(branch) || branch === "ADMIN")) {
            return branch.toUpperCase();
        }
        
        const sessionUser = sessionStorage.getItem('currentUser');
        if (sessionUser) {
            try {
                const userData = JSON.parse(sessionUser);
                const username = userData.username;
                if (username && (/^BR\d{4}$/i.test(username) || username === "ADMIN")) {
                    return username.toUpperCase();
                }
            } catch(e) {}
        }
        
        const mobileUser = localStorage.getItem('mobileUser');
        if (mobileUser) {
            try {
                const userData = JSON.parse(mobileUser);
                const username = userData.username;
                if (username && (/^BR\d{4}$/i.test(username) || username === "ADMIN")) {
                    return username.toUpperCase();
                }
            } catch(e) {}
        }
        
        return null;
    }
    
    async function fetchMobileUnreadChatCount() {
        const branch = getMobileCurrentBranchForChat();
        if (!branch) {
            updateMobileNotificationBadge(0);
            return 0;
        }
        
        try {
            const range = `${CHAT_SHEET_NAME}!A:K`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${CHAT_SPREADSHEET_ID}/values/${range}?key=${CHAT_API_KEY}&_=${Date.now()}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data.values || data.values.length <= 1) {
                updateMobileNotificationBadge(0);
                return 0;
            }
            
            const rows = data.values.slice(1);
            let unreadCount = 0;
            
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (row.length >= 3) {
                    const messageBranch = row[1] ? row[1].toString().toUpperCase() : "";
                    const readStatus = row[8] ? row[8].toString() : "";
                    const readBy = row[9] ? row[9].toString() : "";
                    const allMentionReadBy = row[10] ? row[10].toString() : "";
                    const messageText = row[2] ? row[2].toString().toLowerCase() : "";
                    const isAllMention = messageText.includes('@all');
                    
                    if (messageBranch !== branch) {
                        if (!isAllMention && readStatus !== "TRUE" && !readBy.includes(branch)) {
                            unreadCount++;
                        }
                        else if (isAllMention && !allMentionReadBy.includes(branch)) {
                            unreadCount++;
                        }
                    }
                }
            }
            
            if (unreadCount > lastUnreadCount && unreadCount > 0) {
                setTimeout(() => playMobileNotificationSound(), 100);
            }
            
            lastUnreadCount = unreadCount;
            updateMobileNotificationBadge(unreadCount);
            return unreadCount;
            
        } catch (error) {
            console.error("Error fetching mobile unread chat count:", error);
            updateMobileNotificationBadge(0);
            return 0;
        }
    }
    
    function updateMobileNotificationBadge(count) {
        const badge = document.getElementById('mobileNotificationBadge');
        if (!badge) return;
        
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.classList.remove('zero');
            badge.style.animation = 'pulse-red 0.5s ease-in-out';
            setTimeout(() => {
                if (badge) badge.style.animation = 'pulse-red 1.5s infinite';
            }, 500);
            
            document.title = `(${count}) NOC Mobile`;
        } else {
            badge.textContent = '0';
            badge.classList.add('zero');
            document.title = 'NOC Mobile';
        }
    }
    
    function openMobileChat() {
        const chatUrl = "./chat.html?t=" + Date.now();
        
        // Close any open iframe modal first
        const iframeModal = document.getElementById('iframeModal');
        const popupIframe = document.getElementById('popupIframe');
        const modalTitle = document.getElementById('modalTitleText');
        const iframeLoading = document.getElementById('iframeLoading');
        
        modalTitle.innerText = 'Chat';
        iframeModal.style.display = 'flex';
        iframeLoading.style.display = 'flex';
        popupIframe.style.opacity = '0';
        popupIframe.src = chatUrl;
        
        popupIframe.onload = () => {
            iframeLoading.style.display = 'none';
            popupIframe.style.opacity = '1';
            setTimeout(() => {
                fetchMobileUnreadChatCount();
            }, 3000);
        };
        
        popupIframe.onerror = () => {
            iframeLoading.innerHTML = '<div class="alert alert-danger m-3">Failed to load chat</div>';
            iframeLoading.style.display = 'flex';
        };
        
        document.body.style.overflow = 'hidden';
    }
    
    function startMobileUnreadCheckInterval() {
        if (unreadCheckInterval) clearInterval(unreadCheckInterval);
        
        fetchMobileUnreadChatCount();
        
        unreadCheckInterval = setInterval(() => {
            if (currentUserData) {
                fetchMobileUnreadChatCount();
            }
        }, 10000);
    }
    
    function stopMobileUnreadCheckInterval() {
        if (unreadCheckInterval) {
            clearInterval(unreadCheckInterval);
            unreadCheckInterval = null;
        }
    }
    
    function initMobileNotificationSystem() {
        initMobileNotificationSound();
        setupMobileUserInteractionListener();
        
        const notificationBtn = document.getElementById('mobileNotificationIconBtn');
        if (notificationBtn) {
            notificationBtn.removeEventListener('click', openMobileChat);
            notificationBtn.addEventListener('click', openMobileChat);
        }
        
        const soundToggleBtn = document.getElementById('mobileSoundToggleBtn');
        if (soundToggleBtn) {
            soundToggleBtn.removeEventListener('click', toggleMobileNotificationSound);
            soundToggleBtn.addEventListener('click', toggleMobileNotificationSound);
        }
        
        startMobileUnreadCheckInterval();
    }
    
    // Load sound preference
    const savedSoundPref = localStorage.getItem('notificationSoundEnabled');
    if (savedSoundPref !== null) {
        soundEnabled = savedSoundPref === 'true';
    }
    
    // ========== HELPER FUNCTIONS ==========
    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, function(m){ 
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        });
    }
    
    async function fetchSheetJSON(url) {
        try {
            const res = await fetch(url);
            return await res.json();
        } catch(e) { 
            return { error: true }; 
        }
    }
    
    // Icon processor
    function processIcons(rows) {
        if(!rows || rows.length<2) return;
        for(let i=1; i<rows.length; i++) {
            const row = rows[i];
            if(row.length<6) continue;
            const [mainMenu, mainIcon, subMenu, subIcon, linkItem, linkIcon] = row;
            if(mainMenu && subMenu && linkItem) {
                const key = `${mainMenu}|${subMenu}|${linkItem}`;
                iconMap.set(key, { linkIcon: linkIcon || '<i class="bi bi-box-arrow-up-right"></i>' });
                const mainKey = `${mainMenu}||`;
                if(!iconMap.has(mainKey)) iconMap.set(mainKey, { mainIcon: mainIcon || '<i class="bi bi-app-indicator"></i>' });
                const subKey = `${mainMenu}|${subMenu}|`;
                if(!iconMap.has(subKey)) iconMap.set(subKey, { subIcon: subIcon || '<i class="bi bi-folder"></i>' });
            }
        }
    }
    
    function getIconFor(mainMenu, subMenu='', linkItem='', type) {
        const full = `${mainMenu}|${subMenu}|${linkItem}`;
        if(iconMap.has(full) && type==='link') return iconMap.get(full).linkIcon;
        if(type==='main') {
            const mkey = `${mainMenu}||`;
            return iconMap.has(mkey) ? iconMap.get(mkey).mainIcon : '<i class="bi bi-grid"></i>';
        }
        if(type==='sub') {
            const skey = `${mainMenu}|${subMenu}|`;
            return iconMap.has(skey) ? iconMap.get(skey).subIcon : '<i class="bi bi-folder2"></i>';
        }
        return '<i class="bi bi-link"></i>';
    }
    
    function buildMenuFromRows(rows) {
        if(!rows || rows.length<2) return [];
        const menuMap = new Map();
        for(let i=1; i<rows.length; i++) {
            const row = rows[i];
            if(row.length<4) continue;
            const [mainMenu, subMenu, linkItem, url] = row;
            if(!mainMenu || !subMenu || !linkItem || !url) continue;
            if(!menuMap.has(mainMenu)) menuMap.set(mainMenu, new Map());
            const subMap = menuMap.get(mainMenu);
            if(!subMap.has(subMenu)) subMap.set(subMenu, []);
            subMap.get(subMenu).push({ title: linkItem, url: url, icon: getIconFor(mainMenu, subMenu, linkItem, 'link') });
        }
        const result = [];
        for(let [mainTitle, subMap] of menuMap.entries()) {
            const subArr = [];
            for(let [subTitle, items] of subMap.entries()) {
                subArr.push({ title: subTitle, icon: getIconFor(mainTitle, subTitle, '', 'sub'), items: items });
            }
            result.push({ title: mainTitle, icon: getIconFor(mainTitle, '', '', 'main'), subMenus: subArr });
        }
        return result;
    }
    
    async function loadMenusAndIcons(menuSheetName) {
        try {
            const menuUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${menuSheetName}!A:D?key=${API_KEY}&_=${Date.now()}`;
            const iconUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${ICON_SHEET}!A:F?key=${API_KEY}&_=${Date.now()}`;
            const [menuRes, iconRes] = await Promise.all([fetchSheetJSON(menuUrl), fetchSheetJSON(iconUrl)]);
            if(menuRes.error) throw new Error(`Menu sheet error: ${menuSheetName}`);
            if(iconRes.values) processIcons(iconRes.values);
            return buildMenuFromRows(menuRes.values);
        } catch(e) { 
            console.error(e); 
            return []; 
        }
    }
    
    // Flash news
    async function loadFlashNews() {
        const strip = document.getElementById('flashNewsStrip');
        const tickerDiv = document.getElementById('mobileTicker');
        if(!strip || !tickerDiv) return;
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${FLASH_SHEET}!A2:A?key=${API_KEY}&_=${Date.now()}`;
            const resp = await fetch(url);
            const data = await resp.json();
            if(data.error || !data.values || data.values.length===0) { 
                strip.classList.add('hidden'); 
                return; 
            }
            const texts = data.values.map(row => row[0] ? row[0].toString().trim() : '').filter(t => t!=='');
            if(texts.length===0) { 
                strip.classList.add('hidden'); 
                return; 
            }
            let html = '';
            texts.forEach(t => { html += `<span><i class="bi bi-megaphone-fill"></i> ${escapeHtml(t)}</span>`; });
            tickerDiv.innerHTML = html;
            strip.classList.remove('hidden');
            const tickerWrap = document.querySelector('.ticker-wrap');
            if(tickerWrap) tickerWrap.style.animation = 'none';
            setTimeout(()=> { if(tickerWrap) tickerWrap.style.animation = 'tickerScroll 25s linear infinite'; }, 10);
        } catch(e) { 
            strip.classList.add('hidden'); 
        }
    }
    
    // Render TILES
    function renderMobileTiles(menuData) {
        const container = document.getElementById('mobileMenuGrid');
        if(!container) return;
        if(!menuData || menuData.length===0) {
            container.innerHTML = '<div class="empty-state"><i class="bi bi-info-circle"></i> No applications found</div>';
            return;
        }
        let allLinks = [];
        for(let main of menuData) {
            for(let sub of main.subMenus) {
                for(let link of sub.items) {
                    allLinks.push({
                        title: link.title,
                        url: link.url,
                        iconHtml: link.icon || '<i class="bi bi-link-45deg"></i>',
                        mainCat: main.title,
                        subCat: sub.title
                    });
                }
            }
        }
        if(allLinks.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="bi bi-diagram-3"></i> No links in menu</div>';
            return;
        }
        let tileHtml = '';
        allLinks.forEach(link => {
            tileHtml += `
                <div class="menu-tile" data-url="${escapeHtml(link.url)}" data-title="${escapeHtml(link.title)}">
                    <div class="tile-icon">${link.iconHtml}</div>
                    <div class="tile-label">${escapeHtml(link.title)}</div>
                </div>
            `;
        });
        container.innerHTML = tileHtml;
        document.querySelectorAll('.menu-tile').forEach(tile => {
            tile.addEventListener('click', (e) => {
                e.stopPropagation();
                const url = tile.dataset.url;
                const title = tile.dataset.title || 'Content';
                openPopupIframe(url, title);
            });
        });
    }
    
    // POPUP IFRAME
    const iframeModal = document.getElementById('iframeModal');
    const popupIframe = document.getElementById('popupIframe');
    const modalTitle = document.getElementById('modalTitleText');
    const iframeLoading = document.getElementById('iframeLoading');
    
    function openPopupIframe(url, title) {
        if(!url) return;
        modalTitle.innerText = title || 'Document';
        iframeModal.style.display = 'flex';
        iframeLoading.style.display = 'flex';
        popupIframe.style.opacity = '0';
        popupIframe.src = url;
        popupIframe.onload = () => {
            iframeLoading.style.display = 'none';
            popupIframe.style.opacity = '1';
        };
        popupIframe.onerror = () => {
            iframeLoading.innerHTML = '<div class="alert alert-danger m-3">Failed to load content</div>';
            iframeLoading.style.display = 'flex';
        };
        document.body.style.overflow = 'hidden';
    }
    
    function closeIframePopup() {
        iframeModal.style.display = 'none';
        popupIframe.src = 'about:blank';
        popupIframe.style.opacity = '0';
        iframeLoading.style.display = 'none';
        document.body.style.overflow = '';
    }
    
    // ========== LOGIN & SESSION MANAGEMENT ==========
    
    // Update login timestamp function
    function updateMobileLoginTimestamp(username) {
        return new Promise((resolve) => {
            try {
                const timestamp = new Date().toISOString();
                const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                
                const script = document.createElement('script');
                const url = `${WEB_APP_URL}?action=updateLoginTime&username=${encodeURIComponent(username)}&timestamp=${encodeURIComponent(timestamp)}&callback=${callbackName}`;
                
                window[callbackName] = function(response) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    if (response && response.success) {
                        console.log('✓ Mobile login timestamp recorded for', username);
                    }
                    resolve(true);
                };
                
                script.onerror = () => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    console.warn('⚠ Mobile timestamp update failed');
                    resolve(false);
                };
                
                script.src = url;
                document.body.appendChild(script);
            } catch (error) {
                console.error('Error:', error);
                resolve(false);
            }
        });
    }
    
    function storeUserSession(userData) {
        const sessionData = {
            username: userData.username,
            loginTime: new Date().toISOString(),
            menuSheet: userData.menuSheet
        };
        
        localStorage.setItem('currentUser', JSON.stringify(sessionData));
        sessionStorage.setItem('currentUser', JSON.stringify(sessionData));
        localStorage.setItem('mobileUser', JSON.stringify({ 
            username: userData.username, 
            menuSheet: userData.menuSheet, 
            loginTime: Date.now() 
        }));
        
        console.log('User session stored:', userData.username);
    }
    
    function clearUserSession() {
        stopMobileUnreadCheckInterval();
        localStorage.removeItem('currentUser');
        sessionStorage.removeItem('currentUser');
        localStorage.removeItem('mobileUser');
        sessionStorage.removeItem('mobileUser');
        console.log('User session cleared');
    }
    
    function checkExistingSession() {
        let storedUser = localStorage.getItem('currentUser');
        
        if (!storedUser) {
            storedUser = sessionStorage.getItem('currentUser');
        }
        
        if (!storedUser) {
            const mobileUser = localStorage.getItem('mobileUser');
            if (mobileUser) {
                try {
                    const parsed = JSON.parse(mobileUser);
                    if (parsed.username && parsed.menuSheet) {
                        storedUser = JSON.stringify({
                            username: parsed.username,
                            menuSheet: parsed.menuSheet,
                            loginTime: parsed.loginTime ? new Date(parsed.loginTime).toISOString() : new Date().toISOString()
                        });
                    }
                } catch(e) {}
            }
        }
        
        if (storedUser) {
            try {
                const userData = JSON.parse(storedUser);
                const loginTime = new Date(userData.loginTime);
                const now = new Date();
                const hoursSinceLogin = (now - loginTime) / (1000 * 60 * 60);
                
                if (hoursSinceLogin <= 24) {
                    currentUserData = {
                        username: userData.username,
                        menuSheet: userData.menuSheet
                    };
                    storeUserSession(currentUserData);
                    console.log('Valid mobile session found for user:', userData.username);
                    return true;
                } else {
                    console.log('Mobile session expired (24h limit)');
                    clearUserSession();
                }
            } catch(e) {
                console.error('Error parsing stored user:', e);
                clearUserSession();
            }
        }
        return false;
    }
    
    async function validateMobileLogin(username, password) {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${LOGIN_SHEET}!B:D?key=${API_KEY}&_=${Date.now()}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if(data.error) return null;
            if(data.values) {
                for(let row of data.values) {
                    if(row.length >= 2) {
                        const storedUser = row[0], storedPass = row[1];
                        if(username === storedUser && password === storedPass) {
                            const menuSheet = (row.length >= 3 && row[2]) ? row[2].trim() : 'Menu';
                            return { username: storedUser, menuSheet: menuSheet };
                        }
                    }
                }
            }
            return null;
        } catch(e) { 
            console.error('Login validation error:', e);
            return null; 
        }
    }
    
    async function handleMobileLogin() {
        const username = document.getElementById('mobileUsername').value.trim();
        const password = document.getElementById('mobilePassword').value.trim();
        const errDiv = document.getElementById('loginErrorMsg');
        const loginBtn = document.getElementById('mobileLoginBtn');
        const spinner = document.getElementById('loginSpinner');
        const btnText = document.getElementById('loginBtnText');
        
        if(!username || !password) { 
            showLoginErr('Enter username & password'); 
            return; 
        }
        
        errDiv.style.display = 'none';
        loginBtn.disabled = true;
        spinner.classList.remove('d-none');
        btnText.innerText = 'Verifying...';
        
        try {
            const user = await validateMobileLogin(username, password);
            
            if(user) {
                currentUserData = user;
                storeUserSession(user);
                
                // Update timestamp in background
                updateMobileLoginTimestamp(username).catch(err => {
                    console.warn('Could not update login timestamp:', err);
                });
                
                const loginOverlay = document.getElementById('loginOverlay');
                loginOverlay.style.opacity = '0';
                
                setTimeout(async () => {
                    loginOverlay.style.display = 'none';
                    document.getElementById('dashboardMain').style.display = 'block';
                    document.body.style.overflow = 'auto';
                    
                    const menuData = await loadMenusAndIcons(user.menuSheet);
                    menuStructure = menuData;
                    renderMobileTiles(menuData);
                    displayUserOnTop(user.username);
                    loadFlashNews();
                    initMobileNotificationSystem();
                    
                    console.log('Mobile login successful, dashboard loaded');
                }, 300);
            } else {
                loginBtn.disabled = false;
                spinner.classList.add('d-none');
                btnText.innerText = 'Sign in';
                showLoginErr('Invalid username or password');
                document.getElementById('mobilePassword').value = '';
                document.getElementById('mobileUsername').focus();
            }
        } catch(error) {
            console.error('Login error:', error);
            loginBtn.disabled = false;
            spinner.classList.add('d-none');
            btnText.innerText = 'Sign in';
            showLoginErr('Unable to verify credentials. Please try again.');
        }
    }
    
    function showLoginErr(msg) {
        const errDiv = document.getElementById('loginErrorMsg');
        errDiv.querySelector('span').innerText = msg;
        errDiv.style.display = 'flex';
        setTimeout(()=> errDiv.style.display = 'none', 3000);
    }
    
    function displayUserOnTop(username) {
        const shortSpan = document.getElementById('userShortName');
        if(shortSpan) {
            const displayName = username.split('@')[0].substring(0, 12);
            shortSpan.innerText = displayName;
            shortSpan.title = username;
        }
    }
    
    function logoutMobile() {
        stopMobileUnreadCheckInterval();
        clearUserSession();
        currentUserData = null;
        
        const dashboardMain = document.getElementById('dashboardMain');
        const loginOverlay = document.getElementById('loginOverlay');
        const iframeModal = document.getElementById('iframeModal');
        
        dashboardMain.style.display = 'none';
        loginOverlay.style.display = 'flex';
        loginOverlay.style.opacity = '1';
        
        document.getElementById('mobileUsername').value = '';
        document.getElementById('mobilePassword').value = '';
        
        if(iframeModal) iframeModal.style.display = 'none';
        
        document.body.style.overflow = '';
        
        // Reset notification badge
        updateMobileNotificationBadge(0);
        lastUnreadCount = 0;
        document.title = 'NOC Mobile';
        userInteracted = false;
        
        setTimeout(() => {
            document.getElementById('mobileUsername').focus();
        }, 100);
        
        console.log('User logged out from mobile');
    }
    
    // ========== INITIALIZATION ==========
    document.addEventListener('DOMContentLoaded', () => {
        console.log('DOM loaded, initializing mobile app...');
        
        // Set version in login screen
        const versionSpan = document.getElementById('mobileAppVersion');
        if (versionSpan) {
            versionSpan.textContent = MOBILE_APP_VERSION;
        }
        
        displayMobileCacheInfo();
        
        const loginBtn = document.getElementById('mobileLoginBtn');
        if(loginBtn) loginBtn.addEventListener('click', handleMobileLogin);
        
        const logoutBtn = document.getElementById('mobileLogoutBtn');
        if(logoutBtn) logoutBtn.addEventListener('click', logoutMobile);
        
        const closeBtn = document.getElementById('closeIframeBtn');
        if(closeBtn) closeBtn.addEventListener('click', closeIframePopup);
        
        const pwdField = document.getElementById('mobilePassword');
        if(pwdField) {
            pwdField.addEventListener('keypress', (e) => { 
                if(e.key === 'Enter') handleMobileLogin(); 
            });
        }
        
        const userField = document.getElementById('mobileUsername');
        if(userField) {
            userField.addEventListener('keypress', (e) => { 
                if(e.key === 'Enter') pwdField.focus(); 
            });
        }
        
        const usernameInput = document.getElementById('mobileUsername');
        const passwordInput = document.getElementById('mobilePassword');
        if(usernameInput) usernameInput.addEventListener('input', () => hideMobileLoginError());
        if(passwordInput) passwordInput.addEventListener('input', () => hideMobileLoginError());
        
        function hideMobileLoginError() {
            const errDiv = document.getElementById('loginErrorMsg');
            if(errDiv) errDiv.style.display = 'none';
        }
        
        const hasSession = checkExistingSession();
        
        if(hasSession && currentUserData) {
            console.log('Restoring mobile session for:', currentUserData.username);
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('dashboardMain').style.display = 'block';
            
            loadMenusAndIcons(currentUserData.menuSheet).then(menu => {
                menuStructure = menu;
                renderMobileTiles(menu);
                displayUserOnTop(currentUserData.username);
                loadFlashNews();
                initMobileNotificationSystem();
                console.log('Mobile session restored successfully');
            }).catch(err => {
                console.error('Failed to restore mobile session menu:', err);
                logoutMobile();
            });
        } else {
            console.log('No valid mobile session found, showing login screen');
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('dashboardMain').style.display = 'none';
            setTimeout(() => {
                document.getElementById('mobileUsername').focus();
            }, 100);
        }
    });
    
    // Service worker registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('mobile-sw.js')
                .then(registration => {
                    console.log('ServiceWorker registered successfully:', registration.scope);
                })
                .catch(err => console.log('ServiceWorker registration failed:', err));
        });
    }
</script>
