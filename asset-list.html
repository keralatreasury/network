<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Asset Manager | Compact PC Entry</title>
    
    <!-- Local CSS Resources -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="./css/select2.min.css">
    <link rel="stylesheet" href="./css/select2-bootstrap-5-theme.min.css">
    <link rel="stylesheet" href="./css/flatpickr.min.css">
    <link rel="stylesheet" href="./css/sweetalert2.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body {
            background: #eef2f7;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px 16px;
            margin: 0;
        }
        .app-card {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .tab-header {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 24px;
        }
        .tab-btn {
            padding: 16px 28px;
            font-size: 1rem;
            font-weight: 600;
            background: transparent;
            border: none;
            color: #475569;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }
        .tab-btn i { margin-right: 8px; font-size: 1.1rem; }
        .tab-btn.active {
            color: #1e4a76;
            border-bottom-color: #1e4a76;
            background: white;
        }
        .tab-pane {
            display: none;
            padding: 30px 32px;
            background: white;
        }
        .tab-pane.active-pane {
            display: block;
        }
        .form-label {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 4px;
            font-size: 0.75rem;
        }
        .required:after {
            content: "*";
            color: #dc2626;
            margin-left: 4px;
        }
        .btn-primary-custom {
            background: #0f3b5f;
            border: none;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 40px;
            transition: 0.2s;
            color: white;
            font-size: 0.9rem;
        }
        .btn-primary-custom:hover:not(:disabled) {
            background: #0a2c46;
            transform: translateY(-1px);
        }
        .btn-outline-secondary-custom {
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.85rem;
        }
        .action-icons i {
            font-size: 1.2rem;
            margin: 0 5px;
            cursor: pointer;
            transition: 0.1s;
        }
        .action-icons i.bi-pencil-square { color: #3b82f6; }
        .action-icons i.bi-trash3 { color: #dc2626; }
        .action-icons i:hover { opacity: 0.7; transform: scale(1.05);}
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            padding: 6px 10px;
            font-size: 0.85rem;
        }
        .form-control-sm-custom {
            padding: 5px 8px;
            font-size: 0.8rem;
        }
        /* Single line row container */
        .pc-row-single {
            background: #f9fafb;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            position: relative;
            transition: all 0.2s;
        }
        .pc-row-single:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .row-fields {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 12px;
        }
        .field-group {
            flex: 1 1 0px;
            min-width: 90px;
        }
        .field-group.asset-group {
            flex: 1.2 1 0px;
            min-width: 180px;
        }
        .field-group.ip-group {
            flex: 1 1 0px;
            min-width: 150px;
        }
        .field-group.small-select {
            flex: 0.6 1 0px;
            min-width: 100px;
        }
        .field-group.hidden-field {
            display: none;
        }
        .asset-combiner {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            padding: 4px 6px;
        }
        .asset-part {
            border: none;
            background: transparent;
            padding: 6px 4px;
            width: 70px;
            text-align: center;
            font-size: 0.85rem;
        }
        .asset-part:focus {
            outline: none;
        }
        .asset-sep {
            font-weight: 600;
            color: #475569;
            font-size: 0.85rem;
        }
        .ip-combiner {
            display: flex;
            align-items: center;
            gap: 4px;
            background: white;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            padding: 4px 6px;
        }
        .ip-prefix-field {
            border: none;
            background: transparent;
            padding: 6px 4px;
            width: 100px;
            font-size: 0.85rem;
            font-family: monospace;
        }
        .ip-dot {
            font-weight: bold;
            color: #64748b;
        }
        .ip-last-field {
            border: none;
            background: transparent;
            padding: 6px 4px;
            width: 55px;
            text-align: center;
            font-size: 0.85rem;
        }
        .remove-pc-icon {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }
        .remove-pc-icon:hover { color: #dc2626; }
        .add-pc-btn {
            border: 1px dashed #94a3b8;
            background: #f8fafc;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 500;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .info-banner {
            background: #eef2ff;
            border-radius: 16px;
            padding: 10px 18px;
            margin-bottom: 20px;
            border-left: 5px solid #1e4a76;
            font-size: 0.85rem;
        }
        .btn-sm-icon {
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        @media (max-width: 1100px) {
            .row-fields { flex-wrap: wrap; }
            .field-group { min-width: 130px; }
            .tab-pane { padding: 20px; }
        }
        #global-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(3px);
        }
        .badge-pool-info {
            background: #e6f0fa;
            color: #075985;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .modal-content { border-radius: 24px; }
    </style>
</head>
<body>
<div class="app-card">
    <div class="tab-header">
        <button class="tab-btn active" id="tabAddBtn"><i class="bi bi-plus-circle"></i> Add PC Details</button>
        <button class="tab-btn" id="tabEditBtn"><i class="bi bi-table"></i> Edit / Manage Records</button>
    </div>
    
    <!-- Tab 1: Compact single-line PC rows -->
    <div id="addPane" class="tab-pane active-pane">
        <h4 class="mb-2 fs-5"><i class="bi bi-pc-display"></i> Register PC Assets (Compact View)</h4>
        <div class="info-banner" id="branchInfoBanner">
            <i class="bi bi-info-circle-fill"></i> <strong>Branch:</strong> <span id="displayBranchName">—</span> &nbsp;|&nbsp; 
            <strong>District/Treasury:</strong> <span id="displayDistrictTreasury">—</span> &nbsp;|&nbsp;
            <strong>LAN Pool:</strong> <span id="displayLanPool">—</span>
        </div>
        <div id="pcRowsContainer"></div>
        <div class="mt-3 d-flex gap-3 flex-wrap align-items-center">
            <button id="addMorePcBtn" class="btn btn-outline-secondary add-pc-btn"><i class="bi bi-plus-lg"></i> Add PC</button>
            <button id="submitAllPcBtn" class="btn btn-primary-custom px-4"><i class="bi bi-cloud-upload"></i> Submit All</button>
        </div>
    </div>

    <!-- Tab 2: DataTable -->
    <div id="editPane" class="tab-pane">
        <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
            <h4 class="fs-5"><i class="bi bi-list-ul"></i> Asset Records - Current Branch</h4>
            <button id="refreshTableBtn" class="btn btn-outline-secondary btn-outline-secondary-custom"><i class="bi bi-arrow-repeat"></i> Refresh</button>
        </div>
        <div class="table-responsive">
            <table id="assetTable" class="table table-striped table-hover" style="width:100%">
                <thead>
                    <tr><th>District</th><th>Treasury</th><th>Branch</th><th>Asset ID</th><th>IP Assigned</th><th>Working</th><th>Confirm</th><th>Actions</th>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editAssetModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Edit Asset</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editOriginalAssetId" value="">
                <input type="hidden" id="editOriginalIp" value="">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">District</label><input type="text" id="editDistrict" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">Treasury</label><input type="text" id="editTreasury" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">Branch</label><input type="text" id="editBranch" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">Asset ID</label><input type="text" id="editAssetId" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label">IP Assigned</label><input type="text" id="editIp" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Working</label><select id="editWorkingStatus" class="form-select"><option>Yes</option><option>No</option></select></div>
                    <div class="col-md-3"><label class="form-label">Confirm</label><select id="editConfirm" class="form-select"><option>Yes</option><option>No</option></select></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="confirmAssetUpdateBtn" class="btn btn-primary">Update</button>
            </div>
        </div>
    </div>
</div>

<script src="./js/jquery.min.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>
<script src="./js/jquery.dataTables.min.js"></script>
<script src="./js/dataTables.bootstrap5.min.js"></script>
<script src="./js/select2.min.js"></script>
<script src="./js/sweetalert2.all.min.js"></script>

<script>
    // ================= CONFIGURATION =================
    const SPREADSHEET_ID = "1bhkHXrG_eJxpqhSGBu13UyFjmBV7m8lMemDwcQ-4hlI";
    const DATA_SHEET = "Data";
    const SETTINGS_SHEET = "settings";
    const API_KEY = "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxjbOLZwguC06Wic5ieIdplN7wVFXIv7jUNJBXZn3VJiVWctdK1r0EcEC5iaQ3KEUcNig/exec";
    
    let branchFromCache = null;
    let settingsMap = {};
    let allAssets = [];
    let dataTable = null;
    let pcRowCounter = 0;
    let currentBranchCode = "";
    let currentSettings = { district: "", treasury: "", lanPool: "", branchCodeRaw: "" };
    
    function showGlobalLoading(msg) {
        if($('#global-loading-overlay').length) return;
        $('body').append(`<div id="global-loading-overlay"><div style="background:white;padding:30px;border-radius:24px;text-align:center;"><i class="bi bi-arrow-repeat" style="font-size:48px;color:#0f3b5f;animation:spin 1s linear infinite;"></i><p>${msg}</p></div></div>`);
        $('head').append('<style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>');
    }
    function hideGlobalLoading() { $('#global-loading-overlay').remove(); }
    
    async function fetchSettings() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SETTINGS_SHEET}!A:D?key=${API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            const map = {};
            for(let i=1; i<rows.length; i++) {
                const row = rows[i];
                const district = row[0] ? row[0].trim() : "";
                const treasury = row[1] ? row[1].trim() : "";
                const branch = row[2] ? row[2].trim() : "";
                const lanPool = row[3] ? row[3].trim() : "";
                if(branch) {
                    const branchCodeRaw = branch.length >= 4 ? branch.slice(-4) : branch;
                    map[branch] = { district, treasury, lanPool, branchCodeRaw };
                }
            }
            return map;
        } catch(e) { console.error(e); return {}; }
    }
    
    async function fetchAllAssets() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${DATA_SHEET}!A2:G?key=${API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            return rows.map(row => ({
                district: (row[0] || "").trim(),
                treasury: (row[1] || "").trim(),
                branch: (row[2] || "").trim(),
                assetId: (row[3] || "").trim(),
                ipAssigned: (row[4] || "").trim(),
                workingStatus: (row[5] || "").trim() === "Yes" ? "Yes" : "No",
                confirm: (row[6] || "").trim() === "Yes" ? "Yes" : "No"
            }));
        } catch(e) { return []; }
    }
    
    function loadBranchFromCache() {
        let cached = sessionStorage.getItem("selectedBranch");
        if(!cached) cached = localStorage.getItem("pcBranchCache");
        if(!cached) cached = "HQ-MAIN";
        return cached;
    }
    
    function updateBranchInfo() {
        branchFromCache = loadBranchFromCache();
        currentSettings = settingsMap[branchFromCache] || { district: "Unknown", treasury: "Unknown", lanPool: "10.165.4.0/24", branchCodeRaw: branchFromCache.slice(-4) };
        $("#displayBranchName").text(branchFromCache);
        $("#displayDistrictTreasury").text(`${currentSettings.district} / ${currentSettings.treasury}`);
        $("#displayLanPool").text(currentSettings.lanPool || "N/A");
        currentBranchCode = currentSettings.branchCodeRaw;
    }
    
    // Generate compact single-line row (District/Treasury/Branch hidden but stored)
    function createCompactRow(index) {
        const defaultLanPrefix = currentSettings.lanPool ? currentSettings.lanPool.split('/')[0].replace(/\.\d+$/, '') + "." : "10.165.4.";
        const uniqueId = `pc_row_${index}`;
        return `
        <div class="pc-row-single" data-row-idx="${index}" id="${uniqueId}">
            <button type="button" class="remove-pc-icon" data-idx="${index}"><i class="bi bi-x-circle-fill"></i></button>
            <div class="row-fields">
                <!-- Hidden fields: district, treasury, branch (store values) -->
                <input type="hidden" class="hidden-district" value="${escapeHtml(currentSettings.district)}">
                <input type="hidden" class="hidden-treasury" value="${escapeHtml(currentSettings.treasury)}">
                <input type="hidden" class="hidden-branch" value="${escapeHtml(branchFromCache)}">
                
                <!-- Asset ID group: {code}-NOD-{number} -->
                <div class="field-group asset-group">
                    <label class="form-label required">Asset ID</label>
                    <div class="asset-combiner">
                        <input type="text" class="asset-part1" value="${currentBranchCode}" placeholder="Code" style="width:70px;">
                        <span class="asset-sep">-NOD-</span>
                        <input type="text" class="asset-part3" placeholder="Number" style="width:80px;">
                    </div>
                </div>
                
                <!-- IP Assigned group: prefix . last -->
                <div class="field-group ip-group">
                    <label class="form-label required">IP Address</label>
                    <div class="ip-combiner">
                        <input type="text" class="ip-prefix-field" value="${defaultLanPrefix}" readonly style="width:100px;">
                        <span class="ip-dot">.</span>
                        <input type="text" class="ip-last-field" placeholder="octet" value="10" style="width:55px;">
                    </div>
                </div>
                
                <!-- Working Status select -->
                <div class="field-group small-select">
                    <label class="form-label">Working</label>
                    <select class="form-select working-select">
                        <option selected>Yes</option><option>No</option>
                    </select>
                </div>
                
                <!-- Confirm select -->
                <div class="field-group small-select">
                    <label class="form-label">Confirm</label>
                    <select class="form-select confirm-select">
                        <option selected>Yes</option><option>No</option>
                    </select>
                </div>
            </div>
        </div>`;
    }
    
    function refreshPcRows() {
        $("#pcRowsContainer").empty();
        pcRowCounter = 0;
        addNewCompactRow();
    }
    
    function addNewCompactRow() {
        const idx = pcRowCounter++;
        const newRow = $(createCompactRow(idx));
        $("#pcRowsContainer").append(newRow);
        newRow.find('.remove-pc-icon').off('click').on('click', function() { $(this).closest('.pc-row-single').remove(); });
    }
    
    function collectAllCompactData() {
        const records = [];
        let hasError = false;
        $(".pc-row-single").each(function() {
            const $row = $(this);
            const district = $row.find(".hidden-district").val();
            const treasury = $row.find(".hidden-treasury").val();
            const branch = $row.find(".hidden-branch").val();
            const assetPart1 = $row.find(".asset-part1").val().trim();
            const assetPart3 = $row.find(".asset-part3").val().trim();
            const ipPrefix = $row.find(".ip-prefix-field").val().trim();
            const ipLast = $row.find(".ip-last-field").val().trim();
            const working = $row.find(".working-select").val();
            const confirmVal = $row.find(".confirm-select").val();
            
            if(!assetPart1 || !assetPart3) { hasError = true; Swal.fire("Missing Asset", "Complete Asset ID fields", "warning"); return false; }
            if(!ipLast || isNaN(ipLast) || ipLast < 0 || ipLast > 254) { hasError = true; Swal.fire("Invalid IP", "Last octet must be 1-254", "warning"); return false; }
            const fullAssetId = `${assetPart1}-NOD-${assetPart3}`;
            let fullIp = ipPrefix.endsWith('.') ? `${ipPrefix}${ipLast}` : `${ipPrefix}.${ipLast}`;
            if(fullIp.split('.').length !== 4) fullIp = `${ipPrefix}${ipLast}`;
            records.push({ district, treasury, branch, assetId: fullAssetId, ipAssigned: fullIp, workingStatus: working, confirm: confirmVal });
            return true;
        });
        if(hasError) return null;
        return records;
    }
    
    async function submitBatchRecords(records) {
        if(!records.length) { Swal.fire("Info","No PC records to submit","info"); return false; }
        showGlobalLoading(`Submitting ${records.length} record(s)...`);
        try {
            const payload = { action: "BATCH_ADD", records: records };
            const response = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload), headers: { "Content-Type": "application/json" } });
            const result = await response.json();
            if(result.status === "success") {
                Swal.fire({ icon:"success", title:"Saved!", text:`${records.length} PC(s) added.`, timer:1800, showConfirmButton:false });
                refreshPcRows();
                await loadAssetsAndRenderTable();
                return true;
            } else throw new Error(result.error || "Server error");
        } catch(e) {
            Swal.fire({ icon:"error", title:"Submit Failed", text: e.message + " (Check Apps Script deployment)" });
            return false;
        } finally { hideGlobalLoading(); }
    }
    
    // DataTable for current branch
    async function loadAssetsAndRenderTable() {
        showGlobalLoading("Loading assets...");
        allAssets = await fetchAllAssets();
        const filtered = allAssets.filter(asset => asset.branch === branchFromCache);
        if(dataTable) {
            dataTable.clear();
            dataTable.rows.add(filtered);
            dataTable.draw();
        } else {
            if(dataTable) dataTable.destroy();
            $('#assetTable tbody').empty();
            dataTable = $('#assetTable').DataTable({
                data: filtered,
                columns: [
                    { data: "district" }, { data: "treasury" }, { data: "branch" },
                    { data: "assetId" }, { data: "ipAssigned" },
                    { data: "workingStatus", render: (d) => d==="Yes"? '<span class="badge bg-success">Yes</span>':'<span class="badge bg-secondary">No</span>' },
                    { data: "confirm", render: (d) => d==="Yes"? '<span class="badge bg-success">Yes</span>':'<span class="badge bg-secondary">No</span>' },
                    { data: null, render: (row) => `<div class="action-icons"><i class="bi bi-pencil-square edit-asset" data-assetid="${escapeHtml(row.assetId)}" data-ip="${escapeHtml(row.ipAssigned)}"></i><i class="bi bi-trash3 delete-asset" data-assetid="${escapeHtml(row.assetId)}" data-ip="${escapeHtml(row.ipAssigned)}"></i></div>` }
                ],
                order: [[3, 'asc']],
                pageLength: 25
            });
            attachTableEvents();
        }
        hideGlobalLoading();
    }
    
    function attachTableEvents() {
        $('.edit-asset').off('click').on('click', function() {
            const assetId = $(this).data('assetid');
            const ip = $(this).data('ip');
            const record = allAssets.find(a => a.assetId === assetId && a.ipAssigned === ip && a.branch === branchFromCache);
            if(record) openEditModal(record);
        });
        $('.delete-asset').off('click').on('click', function() {
            const assetId = $(this).data('assetid');
            const ip = $(this).data('ip');
            Swal.fire({ title:'Delete?', text:`Remove ${assetId}`, icon:'warning', showCancelButton:true }).then(res => {
                if(res.isConfirmed) deleteAsset(assetId, ip);
            });
        });
    }
    
    async function deleteAsset(assetId, ip) {
        showGlobalLoading("Deleting...");
        try {
            const payload = { action: "DELETE", assetId, ipAssigned: ip, branch: branchFromCache };
            await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            Swal.fire({ icon:"success", title:"Deleted", timer:1500, showConfirmButton:false });
            await loadAssetsAndRenderTable();
        } catch(e) { Swal.fire("Error", e.message, "error"); } finally { hideGlobalLoading(); }
    }
    
    function openEditModal(record) {
        $("#editOriginalAssetId").val(record.assetId);
        $("#editOriginalIp").val(record.ipAssigned);
        $("#editDistrict").val(record.district);
        $("#editTreasury").val(record.treasury);
        $("#editBranch").val(record.branch);
        $("#editAssetId").val(record.assetId);
        $("#editIp").val(record.ipAssigned);
        $("#editWorkingStatus").val(record.workingStatus);
        $("#editConfirm").val(record.confirm);
        const modal = new bootstrap.Modal(document.getElementById('editAssetModal'));
        modal.show();
    }
    
    async function updateAssetHandler() {
        const originalAssetId = $("#editOriginalAssetId").val();
        const originalIp = $("#editOriginalIp").val();
        const newAssetId = $("#editAssetId").val().trim();
        const newIp = $("#editIp").val().trim();
        const newWorking = $("#editWorkingStatus").val();
        const newConfirm = $("#editConfirm").val();
        const branch = $("#editBranch").val();
        if(!newAssetId || !newIp) { Swal.fire("Error","Asset & IP required","warning"); return; }
        showGlobalLoading("Updating...");
        try {
            const payload = { action: "UPDATE", originalAssetId, originalIp, newAssetId, newIp, newWorking, newConfirm, branch };
            await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            Swal.fire({ icon:"success", title:"Updated", timer:1500 });
            bootstrap.Modal.getInstance(document.getElementById('editAssetModal')).hide();
            await loadAssetsAndRenderTable();
        } catch(e) { Swal.fire("Update failed", e.message, "error"); } finally { hideGlobalLoading(); }
    }
    
    function switchTab(tab) {
        if(tab === 'add') {
            $("#addPane").addClass("active-pane");
            $("#editPane").removeClass("active-pane");
            $("#tabAddBtn").addClass("active");
            $("#tabEditBtn").removeClass("active");
            refreshPcRows();
        } else {
            $("#editPane").addClass("active-pane");
            $("#addPane").removeClass("active-pane");
            $("#tabEditBtn").addClass("active");
            $("#tabAddBtn").removeClass("active");
            loadAssetsAndRenderTable();
        }
    }
    
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    $(async function() {
        showGlobalLoading("Initializing...");
        settingsMap = await fetchSettings();
        branchFromCache = loadBranchFromCache();
        updateBranchInfo();
        await loadAssetsAndRenderTable();
        refreshPcRows();
        hideGlobalLoading();
        
        $("#addMorePcBtn").on("click", addNewCompactRow);
        $("#submitAllPcBtn").on("click", async () => { const records = collectAllCompactData(); if(records && records.length) await submitBatchRecords(records); });
        $("#refreshTableBtn").on("click", () => loadAssetsAndRenderTable());
        $("#tabAddBtn").on("click", () => switchTab('add'));
        $("#tabEditBtn").on("click", () => switchTab('edit'));
        $("#confirmAssetUpdateBtn").on("click", updateAssetHandler);
        addNewCompactRow();
    });
</script>
</body>
</html>
